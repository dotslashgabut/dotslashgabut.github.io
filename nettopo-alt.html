<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetTopo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" /> -->
    <link rel="stylesheet" href="libs/font-awesome/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0c0f14;
            --sf: #141820;
            --cd: #1c2230;
            --bd: #2a3348;
            --fg: #e4eaf2;
            --mt: #7b8ca3;
            --ac: #00d48e;
            --ad: rgba(0, 212, 142, .12);
            --dn: #ff4757;
            --wn: #ffa726;
            --in: #29b6f6;
            --pp: #a855f7;
            --pk: #f472b6;
            --cy: #22d3ee;
            --yl: #facc15;
            --or: #ff8a65;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }
        .app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 280px 1fr auto;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }
        .app.dp-collapsed { grid-template-columns: 280px 1fr 0px; }
        header {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: var(--sf);
            border-bottom: 1px solid var(--bd);
            gap: 10px;
            flex-wrap: nowrap;
            min-height: 60px;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; white-space: nowrap; flex-shrink: 0; }
        .logo i { color: var(--ac); font-size: 20px; }
        .logo span { color: var(--mt); font-weight: 400; font-size: 13px; display: none; }
        .hc {
            display: flex;
            gap: 4px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 4px;
            flex-shrink: 0;
        }
        .mb {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            background: 0;
            color: var(--mt);
            font: 600 12px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .mb:hover { color: var(--fg); }
        .mb.a { background: var(--ac); color: var(--bg); }
        .mb.ac2 { background: var(--in); color: var(--bg); }
        .mb.ad { background: var(--dn); color: #fff; }
        .hs {
            display: flex;
            gap: 14px;
            flex-shrink: 0;
        }
        .hi {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--mt);
            white-space: nowrap;
        }
        .hi .v { font: 500 12px/1 'JetBrains Mono', monospace; color: var(--fg); }
        .d5 { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .d5o { background: var(--ac); box-shadow: 0 0 5px var(--ac); }
        .d5w { background: var(--wn); box-shadow: 0 0 5px var(--wn); }
        .d5f { background: var(--dn); box-shadow: 0 0 5px var(--dn); }
        .ha {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }
        .bt {
            padding: 7px 13px;
            border: 1px solid var(--bd);
            border-radius: 6px;
            background: var(--cd);
            color: var(--fg);
            font: 500 12px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .bt:hover { border-color: var(--ac); color: var(--ac); }
        .bp { background: var(--ac); color: var(--bg); border-color: var(--ac); font-weight: 700; }
        .bp:hover { background: #00b87a; color: var(--bg); }
        .btd { border-color: var(--dn); color: var(--dn); }
        .btd:hover { background: rgba(255, 71, 87, .1); }
        .btx { border-color: var(--pp); color: var(--pp); }
        .btx:hover { background: rgba(168, 85, 247, .1); border-color: var(--pp); color: var(--pp); }
        .btj { border-color: var(--cy); color: var(--cy); }
        .btj:hover { background: rgba(34, 211, 238, .1); border-color: var(--cy); color: var(--cy); }
        .bt-snap {
            border-color: var(--yl);
            color: var(--yl);
        }
        .bt-snap:hover { background: rgba(250, 204, 21, .1); border-color: var(--yl); color: var(--yl); }
        .bt-snap.active {
            background: var(--yl);
            color: var(--bg);
            border-color: var(--yl);
        }
        .bt-snap.active:hover { background: #e6b800; color: var(--bg); }
        .exd { position: relative; display: inline-block; }
        .exd .dd {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 170px;
            z-index: 200;
            flex-direction: column;
            box-shadow: 0 12px 32px rgba(0,0,0,.6);
            transition: opacity 0.15s ease;
        }
        .exd .dd.open { display: flex; }
        .exd .dd button {
            background: 0;
            border: none;
            color: var(--fg);
            padding: 8px 16px;
            font: 500 12px/1 'Space Grotesk', sans-serif;
            text-align: left;
            cursor: pointer;
            transition: background .12s;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .exd .dd button:hover { background: var(--bd); }
        .exd .dd button i { width: 18px; text-align: center; color: var(--mt); font-size: 14px; }
        .exd .dd .sep { height: 1px; background: var(--bd); margin: 4px 12px; }
        .exd .bt { padding: 6px 14px; gap: 6px; }
        .exd .bt i.fa-caret-down { font-size: 10px; margin-left: 2px; opacity: .6; transition: transform .2s; }
        .exd.open .bt i.fa-caret-down { transform: rotate(180deg); }
        .sb {
            background: var(--sf);
            border-right: 1px solid var(--bd);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 13px;
            scroll-behavior: smooth;
            height: 100%;
        }
        .stt {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--mt);
            margin-top: 8px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stt:first-child { margin-top: 0; }
        .cs {
            display: flex;
            gap: 4px;
            margin-bottom: 2px;
        }
        .cb {
            flex: 1;
            padding: 6px 4px;
            border: 2px solid var(--bd);
            border-radius: 5px;
            background: var(--cd);
            color: var(--mt);
            font: 600 11px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
            position: relative;
        }
        .cb:hover { border-color: var(--fg); color: var(--fg); transform: translateY(-1px); }
        .cb.a { border-color: var(--in); color: var(--in); background: rgba(41,182,246,.12); box-shadow: 0 0 12px rgba(41,182,246,.15); }
        .cb .cb-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; border: 1px solid rgba(255,255,255,.1); }
        .db {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            background: var(--cd);
            border: 1px solid var(--bd);
            color: var(--fg);
            cursor: pointer;
            transition: all .12s;
            font: 500 12px/1.3 'Space Grotesk', sans-serif;
            text-align: left;
            width: 100%;
        }
        .db:hover { border-color: var(--ac); transform: translateX(2px); }
        .db.a { border-color: var(--ac); background: var(--ad); }
        .db .iw { width: 30px; height: 30px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
        .db .ds { font-size: 10px; color: var(--mt); font-weight: 400; }
        .dl, .cl { display: flex; flex-direction: column; gap: 2px; }
        .li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background .12s;
            font-size: 12px;
        }
        .li:hover { background: var(--cd); }
        .li.s { background: var(--ad); border-left: 3px solid var(--ac); }
        .li .md { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .li .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .li .mt { font: 500 11px/1 'JetBrains Mono', monospace; color: var(--mt); }
        .port-grid {
            padding: 4px 0 6px 18px;
            display: grid;
            grid-template-columns: repeat(8, 26px);
            gap: 3px;
        }
        .port-box {
            width: 26px;
            height: 26px;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: transform .1s, box-shadow .15s;
            user-select: none;
            flex-shrink: 0;
        }
        .port-box:hover { transform: scale(1.2); z-index: 5; box-shadow: 0 0 12px rgba(255,255,255,.25); }
        .port-box .type-dot { position: absolute; bottom: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; border: 1px solid rgba(0,0,0,.4); }
        .port-box .pnum { font-size: 9px; line-height: 1; text-shadow: 0 0 2px rgba(0,0,0,.8); }
        .port-box:nth-child(8n) { margin-right: 6px; }
        .port-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0 2px 18px;
            font-size: 9px;
            color: var(--mt);
            align-items: center;
        }
        .port-legend .leg-item { display: flex; align-items: center; gap: 4px; }
        .port-legend .leg-sq { width: 11px; height: 11px; border-radius: 2px; border: 1px solid var(--bd); }
        .ca {
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        canvas#dc {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ch {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 16px;
            padding: 7px 18px;
            font-size: 12px;
            color: var(--mt);
            pointer-events: none;
            white-space: nowrap;
        }
        .ch kbd { background: var(--sf); border: 1px solid var(--bd); border-radius: 3px; padding: 1px 6px; font: 500 11px/1.4 'JetBrains Mono', monospace; color: var(--fg); }
        .zc {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .zb {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 1px solid var(--bd);
            background: var(--cd);
            color: var(--fg);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .12s;
        }
        .zb:hover { border-color: var(--ac); color: var(--ac); }
        .dp {
            background: var(--sf);
            border-left: 1px solid var(--bd);
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            position: relative;
            min-width: 340px;
            width: 340px;
            transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease, opacity 0.25s ease, border 0.3s ease;
        }
        .dp-auto-hide {
            min-width: 0 !important;
            width: 0 !important;
            padding: 0 !important;
            border-left: none !important;
            opacity: 0;
            pointer-events: none;
        }
        .dp-toggle {
            position: absolute;
            left: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 48px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-right: none;
            border-radius: 6px 0 0 6px;
            color: var(--mt);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 10;
            pointer-events: auto;
        }
        .dp-toggle:hover { background: var(--bd); color: var(--fg); }
        .dp-auto-hide .dp-toggle {
            left: 0;
            border-radius: 0 6px 6px 0;
            border-right: 1px solid var(--bd);
            border-left: none;
        }
        .de {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: var(--mt);
            text-align: center;
        }
        .de i { font-size: 40px; opacity: .2; }
        .de p { font-size: 13px; line-height: 1.6; }
        .dh { display: flex; align-items: center; gap: 12px; }
        .di { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .dht h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .dht span { font-size: 11px; color: var(--mt); }
        .se {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .stl { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--mt); margin-bottom: 6px; font-weight: 600; }
        .dr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            gap: 8px;
        }
        .dr:not(:last-child) { border-bottom: 1px solid rgba(42,51,72,.5); }
        .dr .l { color: var(--mt); white-space: nowrap; flex-shrink: 0; font-size: 12px; }
        .dr .v { font: 500 12px/1 'JetBrains Mono', monospace; text-align: right; }
        .pb { flex: 1; max-width: 90px; height: 4px; background: var(--bd); border-radius: 2px; overflow: hidden; }
        .pb .f { height: 100%; border-radius: 2px; transition: width .3s; }
        .ei {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 5px;
            padding: 6px 9px;
            color: var(--fg);
            font: 500 13px/1.4 'JetBrains Mono', monospace;
            width: 100%;
            outline: 0;
            transition: border-color .15s;
        }
        .ei:focus { border-color: var(--ac); }
        .eis { width: 140px; flex-shrink: 0; }
        .es {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 5px;
            padding: 6px 8px;
            color: var(--fg);
            font: 500 12px/1.4 'Space Grotesk', sans-serif;
            outline: 0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .es:focus { border-color: var(--ac); }
        .es option { background: var(--cd); color: var(--fg); }
        .tc {
            position: fixed;
            top: 70px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .tt {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 7px;
            padding: 10px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: tI .25s ease, tO .25s ease 2.2s forwards;
            box-shadow: 0 8px 24px rgba(0,0,0,.4);
        }
        .tt.ok { border-left: 3px solid var(--ac); }
        .tt.er { border-left: 3px solid var(--dn); }
        .tt.in { border-left: 3px solid var(--in); }
        @keyframes tI { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes tO { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: 0; }
        ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
        #fileInput { display: none; }
        .port-type-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(42,51,72,.3);
        }
        .port-type-row .pt-label { min-width: 40px; color: var(--mt); font-weight: 600; }
        .port-type-row .pt-select {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 3px 6px;
            color: var(--fg);
            font: 500 11px/1.4 'Space Grotesk', sans-serif;
            outline: 0;
            cursor: pointer;
            flex: 1;
            max-width: 120px;
            transition: opacity .2s;
        }
        .port-type-row .pt-select:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--bd); }
        .port-type-row .pt-select:focus:not(:disabled) { border-color: var(--ac); }
        .port-type-row .pt-status { font-size: 10px; color: var(--mt); margin-left: auto; }
        .port-type-row .pt-status.used { color: var(--ac); }
        /* Snap button active state */
        .snap-btn-active {
            border-color: var(--yl) !important;
            color: var(--yl) !important;
            background: rgba(250, 204, 21, 0.15) !important;
        }
        .snap-btn-active:hover {
            background: rgba(250, 204, 21, 0.25) !important;
        }
        .snap-btn-inactive {
            border-color: var(--bd) !important;
            color: var(--mt) !important;
        }
    </style>
</head>
<body>
<div class="app" id="appContainer">
    <header>
        <div class="logo"><i class="fa-solid fa-diagram-project"></i> NetTopo <span></span></div>
        <div class="hc" id="modeBar">
            <button class="mb a" data-m="place"><i class="fa-solid fa-plus"></i> Place</button>
            <button class="mb" data-m="connect"><i class="fa-solid fa-link"></i> Connect</button>
            <button class="mb" data-m="select"><i class="fa-solid fa-arrow-pointer"></i> Select</button>
            <button class="mb" data-m="delete"><i class="fa-solid fa-eraser"></i> Delete</button>
        </div>
        <div class="hs">
            <div class="hi"><span class="d5 d5o"></span>On <span class="v" id="sO">0</span></div>
            <div class="hi"><span class="d5 d5w"></span>Warn <span class="v" id="sW">0</span></div>
            <div class="hi"><span class="d5 d5f"></span>Off <span class="v" id="sF">0</span></div>
            <div class="hi"><i class="fa-solid fa-link" style="color:var(--in);font-size:11px"></i><span class="v" id="sC">0</span></div>
        </div>
        <div class="ha">
            <button class="bt bt-snap" id="bSnap" title="Snap to grid (40px)"><i class="fa-solid fa-th"></i> Snap</button>
            <button class="bt" id="bCl"><i class="fa-solid fa-trash-can"></i> Clear</button>
            <button class="bt" id="bLa"><i class="fa-solid fa-wand-magic-sparkles"></i> Layout</button>
            <button class="bt" id="bAL"><i class="fa-solid fa-shuffle"></i> Auto</button>
            <button class="bt bp" id="bAd"><i class="fa-solid fa-plus"></i> Add</button>
            <button class="bt btj" id="bSample"><i class="fa-solid fa-flask"></i> Sample</button>
            <div class="exd" id="exportDropdown">
                <button class="bt btx"><i class="fa-solid fa-file-export"></i> Export <i class="fa-solid fa-caret-down"></i></button>
                <div class="dd" id="dropdownMenu">
                    <button id="exPNG"><i class="fa-regular fa-image"></i> PNG</button>
                    <button id="exSVG"><i class="fa-regular fa-file-code"></i> SVG</button>
                    <div class="sep"></div>
                    <button id="exJSON"><i class="fa-regular fa-file-lines"></i> JSON</button>
                    <button id="exPDF"><i class="fa-regular fa-file-pdf"></i> PDF</button>
                    <button id="imJSON"><i class="fa-regular fa-folder-open"></i> Load JSON</button>
                </div>
            </div>
            <input type="file" id="fileInput" accept=".json" />
        </div>
    </header>
    <aside class="sb" id="sb"></aside>
    <main class="ca">
        <canvas id="dc"></canvas>
        <div class="ch" id="cH">Click to place &middot; <kbd>Drag</kbd> move &middot; <kbd>Scroll</kbd> zoom &middot; <kbd>1-4</kbd> modes &middot; <kbd>G</kbd> snap</div>
        <div class="zc">
            <button class="zb" id="zI"><i class="fa-solid fa-plus"></i></button>
            <button class="zb" id="zO"><i class="fa-solid fa-minus"></i></button>
            <button class="zb" id="zR"><i class="fa-solid fa-expand"></i></button>
        </div>
    </main>
    <aside class="dp" id="dP">
        <button class="dp-toggle" id="dpToggle" title="Toggle sidebar"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="de" id="dE"><i class="fa-solid fa-mouse-pointer"></i><p>Select a device or cable<br>to view &amp; edit</p></div>
        <div id="dC" style="display:none"></div>
    </aside>
</div>
<div class="tc" id="tC"></div>

<script>
// ========== DEVICE TYPES ==========
var DT = {

// ========== CIDR HELPERS ==========
function maskToCidr(mask) {
    if (!mask) return '';
    var parts = mask.split('.');
    if (parts.length !== 4) return '';
    var binary = '';
    for (var i = 0; i < 4; i++) {
        var num = parseInt(parts[i]);
        if (isNaN(num) || num < 0 || num > 255) return '';
        binary += num.toString(2).padStart(8, '0');
    }
    var count = 0;
    for (var i = 0; i < 32; i++) {
        if (binary[i] === '1') count++;
        else break;
    }
    return count.toString();
}

function cidrToMask(cidr) {
    var c = parseInt(cidr);
    if (isNaN(c) || c < 0 || c > 32) return '';
    var binary = '';
    for (var i = 0; i < 32; i++) {
        binary += i < c ? '1' : '0';
    }
    var parts = [];
    for (var i = 0; i < 4; i++) {
        parts.push(parseInt(binary.substring(i * 8, i * 8 + 8), 2));
    }
    return parts.join('.');
}

function setPortType(devId, portNum, type) {

    if (!dev.portTypes) { dev.portTypes = []; for (var p = 1; p <= dev.ports; p++) dev.portTypes.push(null); }
    if (portNum >= 1 && portNum <= dev.ports) { dev.portTypes[portNum - 1] = type; return true; }
    return false;

function usedPorts(devId, excCabId) {
    var u = {};
    for (var i = 0; i < cabs.length; i++) {
        var c = cabs[i];
        if (c.id === excCabId) continue;
        if (c.from === devId) u[c.fromPort] = 1;
        if (c.to === devId) u[c.toPort] = 1;
    }
    return u;
}

function nextFree(devId, excCabId) {
    var d = getDeviceById(devId); if (!d) return -1;
    var u = usedPorts(devId, excCabId);
    for (var p = 1; p <= d.ports; p++) { if (!u[p]) return p; }
    return -1;
}

function mkC(f, t, tp) {

    cidC++;
    var a = getDeviceById(f), b = getDeviceById(t);
    var dx = a.x - b.x, dy = a.y - b.y, pts = [];

// ========== HIT TEST ==========
function hD(x, y) {
    for (var i = devs.length - 1; i >= 0; i--) {
        var d = devs[i], r = DT[d.type].r + 6, dx = x - d.x, dy = y - d.y;
        if (dx*dx + dy*dy <= r*r) return d;
    }
    return null;
}
function hC(x, y) {
    var best = null, bestD = 18;
    for (var i = 0; i < cabs.length; i++) {
        var c = cabs[i], a = getDeviceById(c.from), b = getDeviceById(c.to);
        if (!a || !b) continue;
        var ds = ptSegDist(x, y, a.x, a.y, b.x, b.y);
        if (ds < bestD) { bestD = ds; best = c; }
    }
    return best;
}
function ptSegDist(px, py, ax, ay, bx, by) {
    var dx = bx - ax, dy = by - ay, l = dx*dx + dy*dy;
    if (l === 0) return Math.hypot(px - ax, py - ay);
    var t = ((px - ax) * dx + (py - ay) * dy) / l;
    if (t < 0) t = 0; if (t > 1) t = 1;
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function ren() {

    cx.clearRect(0, 0, cW, cH);
    drawGrid();
    cx.save();
    cx.translate(pX, pY);
    cx.scale(zm, zm);
    drawCables();

function drawGrid() {
    var g = 40 * zm; if (g < 8) return;
    var ox = pX % g, oy = pY % g;
    cx.strokeStyle = 'rgba(42,51,72,.3)'; cx.lineWidth = .5; cx.beginPath();
    for (var x = ox; x < cW; x += g) { cx.moveTo(x, 0); cx.lineTo(x, cH); }
    for (var y = oy; y < cH; y += g) { cx.moveTo(0, y); cx.lineTo(cW, y); }
    cx.stroke();
    var o = w2s(0, 0);
    if (o.x > -20 && o.x < cW + 20 && o.y > -20 && o.y < cH + 20) {
        cx.strokeStyle = 'rgba(0,212,142,.06)'; cx.lineWidth = 1; cx.beginPath();
        cx.moveTo(o.x, 0); cx.lineTo(o.x, cH); cx.moveTo(0, o.y); cx.lineTo(cW, o.y); cx.stroke();
    }
    // Snap grid overlay
    if (snapToGrid) {
        var gs = GRID_SIZE * zm;
        if (gs > 4 && gs < 200) {
            var topLeft = s2w(0, 0);
            var bottomRight = s2w(cW, cH);
            var startX = Math.floor(topLeft.x / GRID_SIZE) * GRID_SIZE;
            var startY = Math.floor(topLeft.y / GRID_SIZE) * GRID_SIZE;
            var endX = Math.ceil(bottomRight.x / GRID_SIZE) * GRID_SIZE;
            var endY = Math.ceil(bottomRight.y / GRID_SIZE) * GRID_SIZE;
            var maxLines = 80;
            var stepX = Math.max(1, Math.ceil((endX - startX) / GRID_SIZE / maxLines));
            var stepY = Math.max(1, Math.ceil((endY - startY) / GRID_SIZE / maxLines));
            cx.strokeStyle = 'rgba(250,204,21,.08)'; cx.lineWidth = .5; cx.setLineDash([2,4]);
            cx.beginPath();
            for (var x = startX; x <= endX; x += GRID_SIZE * stepX) {
                var sx = x * zm + pX;
                if (sx >= 0 && sx <= cW) { cx.moveTo(sx, 0); cx.lineTo(sx, cH); }
            }
            for (var y = startY; y <= endY; y += GRID_SIZE * stepY) {
                var sy = y * zm + pY;
                if (sy >= 0 && sy <= cH) { cx.moveTo(0, sy); cx.lineTo(cW, sy); }
            }
            cx.stroke();
            cx.setLineDash([]);
        }
    }
}

function drawCables() {
    for (var i = 0; i < cabs.length; i++) {
        var c = cabs[i], a = getDeviceById(c.from), b = getDeviceById(c.to);
        if (!a || !b) continue;
        var ct = CT[c.type], isSel = (c.id === sCI);
        if (isSel) {
            cx.strokeStyle = ct.co; cx.lineWidth = ct.w + 6; cx.globalAlpha = .12; cx.setLineDash([]);
            cx.beginPath(); cx.moveTo(a.x, a.y); cx.lineTo(b.x, b.y); cx.stroke(); cx.globalAlpha = 1;
        }
        cx.strokeStyle = c.status === 'down' ? 'rgba(255,71,87,.25)' : ct.co;
        cx.lineWidth = ct.w; cx.setLineDash(ct.dh);
        cx.globalAlpha = c.status === 'down' ? .25 : (isSel ? 1 : .55);
        cx.beginPath(); cx.moveTo(a.x, a.y); cx.lineTo(b.x, b.y); cx.stroke();
        cx.setLineDash([]); cx.globalAlpha = 1;
        if (c.status !== 'down') {
            for (var p = 0; p < c.pts.length; p++) {
                var pt = c.pts[p], px = a.x + (b.x - a.x) * pt.t, py = a.y + (b.y - a.y) * pt.t, pr = Math.max(1.5, 3 * (c.type === 'fiber' ? 1.3 : 1));
                cx.beginPath(); cx.arc(px, py, pr, 0, 6.2832); cx.fillStyle = ct.co; cx.globalAlpha = .85; cx.fill();
                cx.beginPath(); cx.arc(px, py, pr + 3, 0, 6.2832); cx.fillStyle = ct.co; cx.globalAlpha = .15; cx.fill(); cx.globalAlpha = 1;
            }
        }
        var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2, lb = (c.name || 'Cable') + ' P' + c.fromPort + '\u2192P' + c.toPort + ' ' + c.bw + 'M';
        cx.font = '600 8px "JetBrains Mono",monospace'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        var tw = cx.measureText(lb).width + 10;
        cx.fillStyle = 'rgba(12,15,20,.9)'; cx.beginPath(); cx.roundRect(mx - tw/2, my - 7, tw, 14, 3); cx.fill();
        cx.strokeStyle = 'rgba(42,51,72,.5)'; cx.lineWidth = .5; cx.stroke();
        cx.fillStyle = c.status === 'degraded' ? '#ffa726' : c.status === 'down' ? '#ff4757' : '#7b8ca3';
        cx.fillText(lb, mx, my);
    }
}

function drawDevices() {
    for (var i = 0; i < devs.length; i++) {
        var d = devs[i], t = DT[d.type], r = t.r, isSel = (d.id === sDI), isCS = (d.id === cSrc), isMultiSel = (selectedDevs.indexOf(d.id) !== -1), s = d.sc;
        if (s < .01) continue;
        cx.save(); cx.translate(d.x, d.y); cx.scale(s, s);
        if (d.status === 'online') {
            var pulse = Math.sin(d.ph) * .5 + .5;
            cx.beginPath(); cx.arc(0, 0, r + 6 + pulse * 12, 0, 6.2832); cx.strokeStyle = 'rgba(' + hR(t.co) + ',' + (0.04 + pulse * .04) + ')'; cx.lineWidth = 1.2; cx.stroke();
        }
        if (isCS) {
            cx.beginPath(); cx.arc(0, 0, r + 8, 0, 6.2832); cx.strokeStyle = '#29b6f6'; cx.lineWidth = 2; cx.setLineDash([5,5]); cx.lineDashOffset = -tm * 28; cx.stroke(); cx.setLineDash([]); cx.lineDashOffset = 0;
        }
        if (isSel || isMultiSel) {
            cx.beginPath(); cx.arc(0, 0, r + 5, 0, 6.2832); cx.strokeStyle = isSel ? '#fff' : '#29b6f6'; cx.lineWidth = isSel ? 3 : 2; cx.setLineDash(isSel ? [4,4] : [3,3]); cx.stroke(); cx.setLineDash([]);
        }
        cx.shadowColor = 'rgba(0,0,0,.35)'; cx.shadowBlur = 12; cx.shadowOffsetY = 3;
        cx.beginPath(); cx.arc(0, 0, r, 0, 6.2832); cx.fillStyle = '#1c2230'; cx.fill();
        cx.shadowColor = 'transparent';
        cx.beginPath(); cx.arc(0, 0, r, 0, 6.2832); cx.strokeStyle = (isSel || isMultiSel) ? '#29b6f6' : 'rgba(42,51,72,.7)'; cx.lineWidth = (isSel || isMultiSel) ? 2.5 : 1.2; cx.stroke();
        cx.fillStyle = t.co; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.font = '900 ' + Math.round(r * .6) + 'px "Font Awesome 6 Free"'; cx.fillText(t.ic, 0, 1);
        var scolor = SC_OBJ[d.status], dx2 = r * .5, dy2 = -r * .5;
        cx.beginPath(); cx.arc(dx2, dy2, 4, 0, 6.2832); cx.fillStyle = scolor; cx.fill();
        cx.beginPath(); cx.arc(dx2, dy2, 4, 0, 6.2832); cx.strokeStyle = '#1c2230'; cx.lineWidth = 2; cx.stroke();
        cx.beginPath(); cx.arc(-r * .5, r * .5, 7, 0, 6.2832); cx.fillStyle = 'rgba(250,204,21,.85)'; cx.fill();
        cx.font = '700 7px "JetBrains Mono",monospace'; cx.fillStyle = '#1a1f2e'; cx.fillText(String(d.ports), -r * .5, r * .5 + .5);
        var cc = 0;

        if (cc > 0) {

            cx.font = '700 7px "JetBrains Mono",monospace'; cx.fillStyle = '#fff'; cx.fillText(String(cc), r * .5, r * .5 + .5);
        }
        cx.font = '700 10px "Space Grotesk",sans-serif'; cx.textAlign = 'center'; cx.textBaseline = 'top'; cx.fillStyle = '#e4eaf2'; cx.fillText(d.name, 0, r + 7);
        cx.font = '500 8px "JetBrains Mono",monospace'; cx.fillStyle = '#7b8ca3'; cx.fillText(d.ip, 0, r + 19);
        cx.restore();
    }
}

function drawConnPreview() {
    if (mode !== 'connect' || cSrc === null) return;

// ========== ANIMATION LOOP ==========
var lT = 0;
function loop(ts) {
    var dt = Math.min((ts - lT) / 1000, .05);
    lT = ts; tm += dt;
    var dirty = false;
    for (var i = 0; i < devs.length; i++) {
        var d = devs[i];
        if (Math.abs(d.sc - d.ts) > .001) { d.sc += (d.ts - d.sc) * Math.min(1, dt * 12); dirty = true; }
        d.ph += dt * 2.5; dirty = true;
    }
    for (var i = 0; i < cabs.length; i++) {
        var c = cabs[i], ct = CT[c.type];
        for (var p = 0; p < c.pts.length; p++) {
            c.pts[p].t += dt * c.pts[p].sp * ct.sp * .5;
            if (c.pts[p].t > 1) c.pts[p].t -= 1;
        }
        dirty = true;
    }
    var r = cv.parentElement.getBoundingClientRect();
    if (Math.abs(r.width - cW) > 0.5 || Math.abs(r.height - cH) > 0.5) {
        dp = window.devicePixelRatio || 1;
        cv.width = r.width * dp; cv.height = r.height * dp;
        cv.style.width = r.width + 'px'; cv.style.height = r.height + 'px';
        cW = r.width; cH = r.height; dirty = true;
    }
    if (dirty) ren();
    requestAnimationFrame(loop);
}

document.getElementById('bAL').addEventListener('click', function() {
    if (devs.length < 2) { toast('Need 2+ devices', 'er'); return; }
    var added = 0;
    for (var i = 0; i < devs.length; i++) {
        var d = devs[i], dconn = 0;
        for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) dconn++; }
        if (dconn >= 3) continue;
        var best = null, bestD = Infinity;
        for (var j = 0; j < devs.length; j++) {
            var o = devs[j];
            if (o.id === d.id) continue;
            var dup = false;
            for (var k = 0; k < cabs.length; k++) {
                if ((cabs[k].from === d.id && cabs[k].to === o.id) || (cabs[k].to === d.id && cabs[k].from === o.id)) { dup = true; break; }
            }
            if (dup) continue;
            var dx = d.x - o.x, dy = d.y - o.y, dist = dx*dx + dy*dy;
            if (dist < bestD) { bestD = dist; best = o; }
        }
        if (best) {
            var nc = mkC(d.id, best.id, 'ethernet');
            if (nc) { cabs.push(nc); added++; }
        }
    }
    if (added > 0) { skipAutoScroll = false; uUI(true); toast('Added ' + added + ' auto-connections', 'ok'); ren(); }
    else toast('No new connections could be made', 'in');
});

function escapeXml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

// EXPORT PNG
function exportPNG() {
    if (!devs.length && !cabs.length) {
        toast('Nothing to export', 'er');
        return;
    }
    // Hitung bounding box
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < devs.length; i++) {
        var d = devs[i], r = DT[d.type].r + 20;
        if (d.x - r < minX) minX = d.x - r;
        if (d.y - r < minY) minY = d.y - r;
        if (d.x + r > maxX) maxX = d.x + r;
        if (d.y + r > maxY) maxY = d.y + r;
        if (d.y + r + 30 > maxY) maxY = d.y + r + 30;
    }
    for (var i = 0; i < cabs.length; i++) {
        var c = cabs[i], a = getDeviceById(c.from), b = getDeviceById(c.to);
        if (a) { if (a.x < minX) minX = a.x; if (a.y < minY) minY = a.y; if (a.x > maxX) maxX = a.x; if (a.y > maxY) maxY = a.y; }
        if (b) { if (b.x < minX) minX = b.x; if (b.y < minY) minY = b.y; if (b.x > maxX) maxX = b.x; if (b.y > maxY) maxY = b.y; }
    }
    var padding = 80;
    minX -= padding; minY -= padding; maxX += padding; maxY += padding;
    var tw = maxX - minX, th = maxY - minY;
    var scale = 2;
    var w = Math.ceil(tw * scale), h = Math.ceil(th * scale);
    var off = document.createElement('canvas');
    off.width = w; off.height = h;
    var ox = off.getContext('2d');

    var savedPX = pX, savedPY = pY, savedZM = zm;
    var savedW = cW, savedH = cH, savedDP = dp;
    var savedCV = cv, savedCX = cx;

    cv = off; cx = ox; cW = w; cH = h; dp = 1;
    pX = -minX * scale; pY = -minY * scale; zm = scale;
    ren();

    cv = savedCV; cx = savedCX; cW = savedW; cH = savedH; dp = savedDP;
    pX = savedPX; pY = savedPY; zm = savedZM;

    var link = document.createElement('a');
    link.download = 'nettopo-export-' + new Date().toISOString().slice(0, 10) + '.png';
    link.href = off.toDataURL('image/png', 1.0);
    link.click();
    toast('PNG exported (full topology, 2x)', 'ok');
}

    var w = Math.ceil(tw * scale), h = Math.ceil(th * scale);
    var off = document.createElement('canvas');
    off.width = w; off.height = h;
    var ox = off.getContext('2d');
    var savedPX = pX, savedPY = pY, savedZM = zm;
    var savedW = cW, savedH = cH, savedDP = dp;
    var savedCV = cv, savedCX = cx;
    cv = off; cx = ox; cW = w; cH = h; dp = 1;
    pX = -minX * scale; pY = -minY * scale; zm = scale;
    ren();
    cv = savedCV; cx = savedCX; cW = savedW; cH = savedH; dp = savedDP;
    pX = savedPX; pY = savedPY; zm = savedZM;
    var imgData = off.toDataURL('image/png', 0.95);

    doc.setFontSize(16);
    doc.setTextColor('#000000');
    doc.text('NetTopo - Network Topology Report', pageWidth / 2, margin + 5, { align: 'center' });
    doc.setFontSize(8);
    doc.setTextColor('#000000');
    doc.text('Generated: ' + new Date().toLocaleString(), pageWidth / 2, margin + 10, { align: 'center' });

    var maxW = pageWidth - 2 * margin, maxH = pageHeight - 2 * margin - 25;
    var iw = tw, ih = th;
    var s = Math.min(maxW / iw, maxH / ih);
    iw *= s; ih *= s;
    doc.addImage(imgData, 'PNG', (pageWidth - iw) / 2, margin + 15, iw, ih);

    // Page 2: Devices
    doc.addPage();
    doc.setFontSize(14);
    doc.setTextColor('#000000');
    doc.text('Device List', margin, margin + 5);
    var deviceRows = [];
    for (var i = 0; i < devs.length; i++) {
        var d = devs[i];
        var cc = 0;
        for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) cc++; }
        var statusLabel = d.status.charAt(0).toUpperCase() + d.status.slice(1);
        deviceRows.push([d.name, DT[d.type].lb, statusLabel, d.ip || '-', d.ports.toString(), cc.toString()]);
    }
    doc.autoTable({
        startY: margin + 10,
        head: [['Name', 'Type', 'Status', 'IP Address', 'Ports', 'Links']],
        body: deviceRows,
        theme: 'plain',
        styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2, fontSize: 7, cellPadding: 1.5, fillColor: '#ffffff' },
        headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 7, fontStyle: 'bold', halign: 'center' },
        alternateRowStyles: { fillColor: '#f8fafc' },
        margin: { left: margin, right: margin },
        tableWidth: pageWidth - 2 * margin,
    });

    var afterDeviceY = doc.lastAutoTable ? doc.lastAutoTable.finalY : (margin + 10 + deviceRows.length * 5);
    var spacing = 8;

    // Cables table
    if (cabs.length > 0) {
        var connRows = [];
        for (var i = 0; i < cabs.length; i++) {
            var c = cabs[i], a = getDeviceById(c.from), b = getDeviceById(c.to);
            var an = a ? a.name : '?', bn = b ? b.name : '?';
            var statusLabel = c.status.charAt(0).toUpperCase() + c.status.slice(1);
            connRows.push([
                an + ' (P' + c.fromPort + ')',
                bn + ' (P' + c.toPort + ')',
                CT[c.type].lb,
                c.bw + 'Mbps',
                statusLabel
            ]);
        }
        var estimatedHeight = connRows.length * 4 + 20;
        var remaining = pageHeight - afterDeviceY - margin - 20;
        if (estimatedHeight < remaining) {
            doc.setFontSize(14);
            doc.setTextColor('#000000');
            doc.text('Cable Connections', margin, afterDeviceY + spacing);
            doc.autoTable({
                startY: afterDeviceY + spacing + 5,
                head: [['From', 'To', 'Type', 'Bandwidth', 'Status']],
                body: connRows,
                theme: 'plain',
                styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2, fontSize: 6.5, cellPadding: 1.5, fillColor: '#ffffff' },
                headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 6.5, fontStyle: 'bold', halign: 'center' },
                alternateRowStyles: { fillColor: '#f8fafc' },
                margin: { left: margin, right: margin },
                tableWidth: pageWidth - 2 * margin,
            });
        } else {
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor('#000000');
            doc.text('Cable Connections', margin, margin + 5);
            doc.autoTable({
                startY: margin + 10,
                head: [['From', 'To', 'Type', 'Bandwidth', 'Status']],
                body: connRows,
                theme: 'plain',
                styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2, fontSize: 6.5, cellPadding: 1.5, fillColor: '#ffffff' },
                headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 6.5, fontStyle: 'bold', halign: 'center' },
                alternateRowStyles: { fillColor: '#f8fafc' },
                margin: { left: margin, right: margin },
                tableWidth: pageWidth - 2 * margin,
            });
        }
    }

    // Selected device details
    if (sDI !== null) {
        var selDev = getDeviceById(sDI);
        if (selDev) {
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor('#000000');
            doc.text('Selected Device Details', margin, margin + 5);
            doc.setFontSize(9);
            var y = margin + 15;
            var details = [
                ['Name:', selDev.name],
                ['Type:', DT[selDev.type].lb],
                ['Status:', selDev.status],
                ['IP:', selDev.ip],
                ['Subnet:', selDev.subnet],
                ['Gateway:', selDev.gateway],
                ['MAC:', selDev.mac],
                ['Ports:', selDev.ports],
                ['CPU:', selDev.cpu + '%'],
                ['Memory:', selDev.mem + '%'],
                ['Temperature:', selDev.temp + '\u00b0C'],
                ['Uptime:', selDev.uptime],
                ['Position:', '(' + Math.round(selDev.x) + ', ' + Math.round(selDev.y) + ')']
            ];
            for (var i = 0; i < details.length; i++) {
                doc.text(details[i][0] + ' ' + details[i][1], margin, y);
                y += 6;
            }
        }
    }

    // Selected cable details
    if (sCI !== null) {
        var selCab = null;
        for (var i = 0; i < cabs.length; i++) { if (cabs[i].id === sCI) { selCab = cabs[i]; break; } }
        if (selCab) {
            var a = getDeviceById(selCab.from), b = getDeviceById(selCab.to);
            if (a && b) {
                doc.addPage();
                doc.setFontSize(14);
                doc.setTextColor('#000000');
                doc.text('Selected Cable Details', margin, margin + 5);
                doc.setFontSize(9);
                var y = margin + 15;
                var details = [
                    ['Name:', selCab.name || 'Cable'],
                    ['Type:', CT[selCab.type].lb],
                    ['Status:', selCab.status],
                    ['From:', a.name + ' (P' + selCab.fromPort + ')'],
                    ['To:', b.name + ' (P' + selCab.toPort + ')'],
                    ['Bandwidth:', selCab.bw + ' Mbps'],
                    ['Max:', selCab.mx + ' Mbps'],
                    ['Latency:', selCab.lat + ' ms'],
                    ['Length:', selCab.len + 'm']
                ];
                for (var i = 0; i < details.length; i++) {
                    doc.text(details[i][0] + ' ' + details[i][1], margin, y);
                    y += 6;
                }
            }
        }
    }

    doc.save('nettopo-report-' + new Date().toISOString().slice(0, 10) + '.pdf');
    toast('PDF exported successfully!', 'ok');
}

// EXPORT JSON
function exportJSON() {
    if (!devs.length && !cabs.length) {
        toast('Nothing to export', 'er');
        return;
    }
    var data = {
        version: '1.0',
        exportedAt: new Date().toISOString(),
        devices: devs.map(function(d) { return JSON.parse(JSON.stringify(d)); }),
        cables: cabs.map(function(c) { return JSON.parse(JSON.stringify(c)); }),
        view: { panX: panX, panY: panY, zoom: zoom }
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var link = document.createElement('a');
    link.download = 'nettopo-export-' + new Date().toISOString().slice(0, 10) + '.json';
    link.href = URL.createObjectURL(blob);
    link.click();
    setTimeout(function() { URL.revokeObjectURL(link.href); }, 5000);
    toast('JSON exported (' + devs.length + ' devices, ' + cabs.length + ' cables)', 'ok');
}

// IMPORT JSON
function importJSON(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var data = JSON.parse(e.target.result);
            if (!data.devices || !data.cables) { toast('Invalid JSON format', 'er'); return; }
            devs = []; cabs = [];
            idC = 0; cidC = 0;
            for (var i = 0; i < data.devices.length; i++) {
                var d = data.devices[i];
                if (!DT[d.type]) { toast('Unknown type: ' + d.type, 'er'); continue; }
                if (d.id > idC) idC = d.id;
                d.sc = 0; d.ts = 1; d.ph = Math.random() * 6.28;
                if (!d.portTypes) { d.portTypes = []; for (var p = 1; p <= d.ports; p++) d.portTypes.push(null); }
                devs.push(d);
            }
            for (var i = 0; i < data.cables.length; i++) {
                var c = data.cables[i];
                if (c.id > cidC) cidC = c.id;
                if (!c.pts) c.pts = [];
                cabs.push(c);
            }
            if (data.view) { panX = data.view.panX || 0; panY = data.view.panY || 0; zoom = data.view.zoom || 1.0; }
            sDI = null; sCI = null; cSrc = null; selectedDevs = [];
            skipAutoScroll = false;
            uUI(true);
            ren();
            toast('Import successful (' + devs.length + ' devices, ' + cabs.length + ' cables)', 'ok');
        } catch (err) {
            toast('Failed to import JSON: ' + err.message, 'er');
        }
    };
    reader.readAsText(file);
}

// ========== EXPORT EVENT LISTENERS ==========
document.getElementById('exPNG').addEventListener('click', function() { exportPNG(); });
document.getElementById('exSVG').addEventListener('click', function() { exportSVG(); });
document.getElementById('exJSON').addEventListener('click', function() { exportJSON(); });
document.getElementById('exPDF').addEventListener('click', function() { exportPDF(); });
document.getElementById('imJSON').addEventListener('click', function() {
    document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(e) {
    if (this.files && this.files[0]) {
        importJSON(this.files[0]);
    }
    this.value = '';
});

// ========== INIT ==========
function init() {
    buildSB();
    rsz();
    loadSample();
    // Set initial snap state
    document.getElementById('bSnap').classList.add('snap-btn-active');
    document.getElementById('bSnap').classList.add('active');
    snapToGrid = true;
    requestAnimationFrame(loop);
}
init();
</script>
