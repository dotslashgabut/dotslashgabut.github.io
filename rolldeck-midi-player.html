  const orientVertBtn = document.getElementById("orientVertBtn");
  const legendEl = document.getElementById("legendEl");
  const trackLegendEl = document.getElementById("trackLegendEl");
  const mixerTabs = document.getElementById("mixerTabs");
  const indicatorEl = document.getElementById("indicatorEl");
  const sidebar = document.getElementById("sidebar");
  const sidebarToggleBtn = document.getElementById("sidebarToggleBtn");
  const sidebarCloseBtn = document.getElementById("sidebarCloseBtn");
  const toastEl = document.getElementById("toastEl");
  const sfInput = document.getElementById("sfInput");
  const engineBuiltinBtn = document.getElementById("engineBuiltinBtn");
  const engineSfBtn = document.getElementById("engineSfBtn");
  const sfStatus = document.getElementById("sfStatus");
  const infoBtn = document.getElementById("infoBtn");
  const infoPanel = document.getElementById("infoPanel");
  const bpmEl = document.getElementById("bpmEl");

  let dpr = window.devicePixelRatio || 1;
  let keyLayoutCache = {};

  /* ============================================================
     CHANNEL AUDIBILITY (mute / solo)
     ============================================================ */
  function recomputeSoloFlag(){ anySolo = Object.keys(channelSolo).some(k => channelSolo[k]); }
  function isChannelAudible(ch){
    if(anySolo) return !!channelSolo[ch];
    return !channelMuted[ch];
  }
  function recomputeTrackSoloFlag(){ anyTrackSolo = Object.keys(trackSolo).some(k => trackSolo[k]); }
  function isTrackAudible(tr){
    if(tr == null) return true;
    if(anyTrackSolo) return !!trackSolo[tr];
    return !trackMuted[tr];
  }
  // Combined per-note audibility: a note only sounds if both its channel
  // AND its source track pass their independent mute/solo filters.
  function isNoteAudible(note){
    return isChannelAudible(note.channel) && isTrackAudible(note.track);
  }
  function effectiveProgram(ch){
    return instrumentOverride.hasOwnProperty(ch) ? instrumentOverride[ch] : (currentProgramByChannel[ch] || 0);
  }
  function channelVolumeFactor(ch){
    return channelVolume.hasOwnProperty(ch) ? channelVolume[ch] : 1;
  }
  // GM channel 10 is the percussion channel by convention, but some non-standard
  // files repurpose it for melodic content — channelForceMelodic lets the user
  // override that per song.
  function isDrumChannel(ch){
    return ch === 9 && !channelForceMelodic[9];
  }
  // Maps a GM program number to a built-in-synth timbre so swapping the
  // instrument is audible even without a loaded soundfont.
  function timbreForProgram(program){
    const fam = Math.floor((program||0)/8) % 16;
    const TIMBRES = [
      { wave:"triangle", detune:2,  attack:0.006, release:0.04,  gain:0.22 }, // 0 Piano
      { wave:"triangle", detune:5,  attack:0.002, release:0.05,  gain:0.20 }, // 1 Chromatic Perc
      { wave:"square",   detune:0,  attack:0.02,  release:0.06,  gain:0.15 }, // 2 Organ
      { wave:"sawtooth", detune:3,  attack:0.006, release:0.05,  gain:0.16 }, // 3 Guitar
      { wave:"sine",     detune:1,  attack:0.006, release:0.05,  gain:0.26 }, // 4 Bass
      { wave:"sawtooth", detune:6,  attack:0.05,  release:0.12,  gain:0.14 }, // 5 Strings
      { wave:"sawtooth", detune:8,  attack:0.04,  release:0.1,   gain:0.15 }, // 6 Ensemble
      { wave:"square",   detune:4,  attack:0.015, release:0.06,  gain:0.17 }, // 7 Brass
      { wave:"sawtooth", detune:2,  attack:0.02,  release:0.06,  gain:0.15 }, // 8 Reed
      { wave:"sine",     detune:0,  attack:0.02,  release:0.08,  gain:0.2  }, // 9 Pipe
      { wave:"square",   detune:5,  attack:0.004, release:0.05,  gain:0.19 }, // 10 Synth Lead
      { wave:"triangle", detune:7,  attack:0.09,  release:0.18,  gain:0.16 }, // 11 Synth Pad
      { wave:"sawtooth", detune:12, attack:0.03,  release:0.15,  gain:0.13 }, // 12 Synth FX
      { wave:"triangle", detune:4,  attack:0.008, release:0.06,  gain:0.19 }, // 13 Ethnic
      { wave:"square",   detune:1,  attack:0.001, release:0.03,  gain:0.2  }, // 14 Percussive
      { wave:"sawtooth", detune:14, attack:0.01,  release:0.07,  gain:0.14 }  // 15 SFX
    ];
    return TIMBRES[fam];
  }

  /* ============================================================
     AUDIO ENGINE
     ============================================================ */
  function ensureAudioContext(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = volume;
      lowpass = audioCtx.createBiquadFilter();
      lowpass.type = "lowpass";
      lowpass.frequency.value = 6500;
      lowpass.Q.value = 0.4;
      compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -18;
      compressor.knee.value = 24;
      compressor.ratio.value = 4;
      compressor.attack.value = 0.003;
      compressor.release.value = 0.25;
      masterGain.connect(lowpass);
      lowpass.connect(compressor);
      compressor.connect(audioCtx.destination);
    }
  }

  function midiToFreq(note){ return 440 * Math.pow(2, (note-69)/12); }

  function trackVoice(node, channel, trackIdx){
    const entry = { node, channel, track: trackIdx };
    voices.push(entry);
    return entry;
  }
  function untrackVoice(entry){
    const idx = voices.indexOf(entry);
    if(idx >= 0) voices.splice(idx, 1);
  }

  function playVoice(note, startCtxTime, duration){
    if(synthEngine === "soundfont" && sfReady){
      playSoundfontVoice(note, startCtxTime, duration);
    } else {
      playVoiceBuiltin(note, startCtxTime, duration);
    }
  }

  function playVoiceBuiltin(note, startCtxTime, duration){
    if(isDrumChannel(note.channel)){
      // percussive noise burst for the drum channel
      const len = Math.max(0.03, Math.min(duration, 0.28));
      const bufferSize = Math.floor(audioCtx.sampleRate * len);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/bufferSize, 2);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 90 + note.note*7;
      bp.Q.value = 0.9;
      const g = audioCtx.createGain();
      const peak = (note.velocity/127) * 0.42 * channelVolumeFactor(note.channel);
      g.gain.setValueAtTime(peak, startCtxTime);
      g.gain.exponentialRampToValueAtTime(0.001, startCtxTime+len);
      src.connect(bp).connect(g).connect(masterGain);
      src.start(startCtxTime);
      src.stop(startCtxTime+len+0.02);
      const entry = trackVoice(src, note.channel, note.track);
      src.onended = function(){
        try{ bp.disconnect(); }catch(e){}
        try{ g.disconnect(); }catch(e){}
        try{ src.disconnect(); }catch(e){}
        untrackVoice(entry);
      };
      return;
    }
    const timbre = timbreForProgram(effectiveProgram(note.channel));
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    osc.type = timbre.wave;
    osc2.type = timbre.wave;
    osc.frequency.value = midiToFreq(note.note);
    osc2.frequency.value = midiToFreq(note.note) * (1 + timbre.detune/1000);
    const g = audioCtx.createGain();
    const attack = timbre.attack, release = timbre.release;
    const peak = (note.velocity/127) * timbre.gain * channelVolumeFactor(note.channel);
    const now = startCtxTime;
    const sustainEnd = Math.max(now+attack+0.004, now+duration-release);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now+attack);
    g.gain.setValueAtTime(peak, sustainEnd);
    g.gain.linearRampToValueAtTime(0.0001, sustainEnd+release);
    osc.connect(g); osc2.connect(g); g.connect(masterGain);
    const stopTime = sustainEnd+release+0.02;
    osc.start(now); osc2.start(now);
    osc.stop(stopTime); osc2.stop(stopTime);
    const entryA = trackVoice(osc, note.channel, note.track);
    const entryB = trackVoice(osc2, note.channel, note.track);
    osc2.onended = function(){
      try{ osc.disconnect(); }catch(e){}
      try{ osc2.disconnect(); }catch(e){}
      try{ g.disconnect(); }catch(e){}
      untrackVoice(entryA);
      untrackVoice(entryB);
    };
  }

  function stopAllVoices(){
    const now = audioCtx ? audioCtx.currentTime : 0;
    for(const v of voices){
      try{ v.node.stop(now); }catch(e){}
      try{ v.node.disconnect(); }catch(e){}
    }
    voices = [];
  }
  function stopVoicesForChannel(ch){
    const now = audioCtx ? audioCtx.currentTime : 0;
    voices = voices.filter(v=>{
      if(v.channel !== ch) return true;
      try{ v.node.stop(now); }catch(e){}
      try{ v.node.disconnect(); }catch(e){}
      return false;
    });
  }
  function stopVoicesForTrack(tr){
    const now = audioCtx ? audioCtx.currentTime : 0;
    voices = voices.filter(v=>{
      if(v.track !== tr) return true;
      try{ v.node.stop(now); }catch(e){}
      try{ v.node.disconnect(); }catch(e){}
      return false;
    });
  }

  /* ---------- incremental look-ahead scheduler ---------- */
  function findFirstIndexAfter(offset){
    let lo=0, hi=currentNotes.length;
    while(lo<hi){
      const mid=(lo+hi)>>1;
      if(currentNotes[mid].startTime <= offset) lo=mid+1; else hi=mid;
    }
    return lo;
  }
  function scheduleActiveAtOffset(offset){
    for(const note of currentNotes){
      if(note.startTime > offset) break;
      if(note.endTime > offset && isNoteAudible(note)){
        const dur = (note.endTime - offset) / speed;
        if(dur > 0.005) playVoice(note, playStartCtxTime, dur);
      }
    }
  }
  function schedulerTick(){
    if(!isPlaying) return;
    const t = getCurrentTime();
    const scheduleUntil = t + SCHEDULE_AHEAD;
    while(nextNoteIndex < currentNotes.length && currentNotes[nextNoteIndex].startTime <= scheduleUntil){
      const note = currentNotes[nextNoteIndex];
      if(isNoteAudible(note)){
        const ctxStart = playStartCtxTime + (note.startTime - playStartOffset) / speed;
        const dur = (note.endTime - note.startTime) / speed;
        if(dur > 0.005) playVoice(note, ctxStart, dur);
      }
      nextNoteIndex++;
    }
  }
  function startScheduler(offset){
    stopAllVoices();
    ensureAudioContext();
    playStartCtxTime = audioCtx.currentTime + 0.06;
    playStartOffset = offset;
    scheduleActiveAtOffset(offset);
    nextNoteIndex = findFirstIndexAfter(offset);
    if(schedulerTimer) clearInterval(schedulerTimer);
    schedulerTick();
    schedulerTimer = setInterval(schedulerTick, SCHEDULE_INTERVAL_MS);
  }
  function stopScheduler(){
    if(schedulerTimer){ clearInterval(schedulerTimer); schedulerTimer = null; }
  }

  function getCurrentTime(){
    if(!isPlaying) return playStartOffset;
    return playStartOffset + (audioCtx.currentTime - playStartCtxTime) * speed;
  }

  /* ============================================================
     TRANSPORT
     ============================================================ */
  function play(){
    if(!fileLoaded) return;
    ensureAudioContext();
    if(audioCtx.state === "suspended") audioCtx.resume();
    let offset = playStartOffset;
    if(offset >= songDuration) offset = 0;
    isPlaying = true;
    startScheduler(offset);
    document.body.classList.add("is-playing");
    updatePlayButton();
    requestAnimationFrame(loop);
  }
  function pause(){
    const offset = getCurrentTime();
    stopScheduler();
    stopAllVoices();
    isPlaying = false;
    playStartOffset = offset;
    document.body.classList.remove("is-playing");
    updatePlayButton();
  }
  function stopPlayback(){
    stopScheduler();
    stopAllVoices();
    isPlaying = false;
    playStartOffset = 0;
    document.body.classList.remove("is-playing");
    updatePlayButton();
    render(0);
    updateTimeLabels(0);
    seekSlider.value = 0;
  }
  function togglePlay(){ isPlaying ? pause() : play(); }

  function setSpeed(newSpeed){
    const offset = getCurrentTime();
    speed = newSpeed;
    if(isPlaying) startScheduler(offset); else playStartOffset = offset;
  }

  function loop(){
    if(!isPlaying) return;
    const t = getCurrentTime();
    if(t >= songDuration){
      stopPlayback();
      return;
    }
    render(t);
    updateTimeLabels(t);
    if(!seeking) seekSlider.value = Math.floor(t*1000);
    requestAnimationFrame(loop);
  }

  function updatePlayButton(){
    playBtn.disabled = !fileLoaded;
    stopBtn.disabled = !fileLoaded;
    seekSlider.disabled = !fileLoaded;
    playIcon.style.display = isPlaying ? "none" : "block";
    pauseIcon.style.display = isPlaying ? "block" : "none";
  }

  function formatTime(sec){
    sec = Math.max(0, sec);
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return m + ":" + String(s).padStart(2,"0");
  }
  function updateTimeLabels(t){
    curTimeEl.textContent = formatTime(t);
    totTimeEl.textContent = formatTime(songDuration);
    const bpm = bpmAtTime(t);
    bpmEl.textContent = bpm != null ? (Math.round(bpm) + " BPM") : "— BPM";
  }

  /* ============================================================
     FILE LOADING
     ============================================================ */
  function showError(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 3200);
  }

  function loadMidiFile(file){
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const parsed = parseMidi(e.target.result);
        const allEvents = [];
        parsed.tracks.forEach((t, ti) => { t.forEach(ev => ev.track = ti); allEvents.push(...t); });
        allEvents.sort((a,b)=>a.tick-b.tick);

        let tempoEvents = allEvents.filter(ev => ev.type === "tempo");
        if(tempoEvents.length === 0 || tempoEvents[0].tick > 0){
          tempoEvents = [{ tick:0, type:"tempo", microsecondsPerQuarter:500000 }].concat(tempoEvents);
        }
        const timeMaps = buildTimeMaps(tempoEvents, parsed.ticksPerQuarter);
        const tickToSeconds = timeMaps.tickToSeconds;
        const notes = extractNotes(allEvents, tickToSeconds);
        if(!notes.length){ showError("No playable notes found in this file."); return; }

        const programByChannel = {};
        allEvents.filter(ev => ev.type === "programChange").forEach(ev => { programByChannel[ev.channel] = ev.program; });

        stopScheduler();
        stopAllVoices();
        isPlaying = false;
        document.body.classList.remove("is-playing");
        playStartOffset = 0;
        speed = 1; speedSlider.value = 100; speedVal.textContent = "1.00×";
        channelMuted = {}; channelSolo = {}; anySolo = false;
        trackMuted = {}; trackSolo = {}; anyTrackSolo = false;
        instrumentOverride = {}; channelVolume = {}; channelForceMelodic = {};

        currentNotes = notes;
        currentProgramByChannel = programByChannel;

        // Build per-track metadata (name, channels used, note count) so tracks
        // can be listed and toggled independently of channel filtering.
        const trackNameByIdx = {};
        allEvents.filter(ev => ev.type === "trackName" && ev.name).forEach(ev => {
          if(trackNameByIdx[ev.track] === undefined) trackNameByIdx[ev.track] = ev.name;
        });
        const trackChannels = {};
        const trackNoteCount = {};
        notes.forEach(n => {
          if(n.track == null) return;
          (trackChannels[n.track] = trackChannels[n.track] || new Set()).add(n.channel);
          trackNoteCount[n.track] = (trackNoteCount[n.track] || 0) + 1;
        });
        trackList = Object.keys(trackNoteCount).map(k=>parseInt(k,10)).sort((a,b)=>a-b).map(ti => ({
          index: ti,
          name: trackNameByIdx[ti] || null,
          channels: Array.from(trackChannels[ti] || []).sort((a,b)=>a-b),
          noteCount: trackNoteCount[ti]
        }));
        songDuration = notes.reduce((m,n)=>Math.max(m,n.endTime), 0) + 0.6;
        fileLoaded = true;
        fileNameEl.textContent = file.name;
        seekSlider.max = Math.floor(songDuration*1000);
        seekSlider.value = 0;

        bpmAtTime = timeMaps.bpmAtSeconds;

        const timeSigEvents = allEvents.filter(ev => ev.type === "timeSignature");
        const keySigEvents = allEvents.filter(ev => ev.type === "keySignature");
        const trackNameEvents = allEvents.filter(ev => ev.type === "trackName" && ev.name);
        const ts = timeSigEvents[0] || { numerator:4, denominator:4 };
        const ks = keySigEvents[0];
        const channelsUsed = Array.from(new Set(notes.map(n=>n.channel))).length;

        songInfo = {
          title: (trackNameEvents[0] && trackNameEvents[0].name) ? trackNameEvents[0].name : file.name.replace(/\.[^.]+$/, ""),
          fileName: file.name,
          fileSize: file.size,
          format: parsed.format,
          numTracks: parsed.tracks.length,
          ticksPerQuarter: parsed.ticksPerQuarter,
          timeSignature: ts.numerator + "/" + ts.denominator,
          keySignature: ks ? keySignatureName(ks.sf, ks.mi) : null,
          initialBpm: Math.round(60000000 / tempoEvents[0].microsecondsPerQuarter),
          tempoVaries: tempoEvents.length > 1,
          tempoChangeCount: tempoEvents.length,
          noteCount: notes.length,
          channelsUsed,
          duration: songDuration
        };
        renderInfoPanel(songInfo);
        infoBtn.disabled = false;
        infoPanel.classList.remove("show");

        buildLegend(notes, programByChannel);
        buildTrackLegend(trackList);
        buildChannelIndicators();
        dropzone.style.display = "none";
        updateTimeLabels(0);
        updatePlayButton();
        resizeCanvas();
        render(0);
        maybePrewarmSoundfont();
      }catch(err){
        console.error(err);
        showError("Could not read this file: " + err.message);
      }
    };
    reader.onerror = function(){ showError("Failed to read the file."); };
    reader.readAsArrayBuffer(file);
  }

  function loadSoundfontFile(file){
    sfStatus.textContent = "Parsing " + file.name + "…";
    engineSfBtn.disabled = true;
    const reader = new FileReader();
    reader.onload = function(e){
      // Deferred one tick so the "Parsing…" status actually paints before
      // the (synchronous) parse/prewarm work blocks the main thread.
      setTimeout(function(){
        try{
          const buf = e.target.result;
          const parsed = parseSF2(buf);
          sfRawBuffer = buf;
          sfSmplOffset = parsed.smplOffset;
          sfPresetIndex = parsed.presetIndex;
          sfInstruments = parsed.instruments;
          sfShdr = parsed.shdrList;
          sfSampleCache = {};
          sfReady = true;
          sfName = file.name;

          maybePrewarmSoundfont();

          engineSfBtn.disabled = false;
          setEngine("soundfont");
          const presetCount = Object.keys(sfPresetIndex).length;
          sfStatus.textContent = sfName + " · " + presetCount + " presets";
        }catch(err){
          console.error(err);
          sfReady = false;
          engineSfBtn.disabled = true;
          sfStatus.textContent = "";
          showError("Could not load soundfont: " + err.message);
        }
      }, 10);
    };
    reader.onerror = function(){ showError("Failed to read the soundfont file."); };
    reader.readAsArrayBuffer(file);
  }

  function setEngine(mode){
    synthEngine = mode;
    engineBuiltinBtn.classList.toggle("active", mode === "builtin");
    engineSfBtn.classList.toggle("active", mode === "soundfont");
    if(isPlaying) startScheduler(getCurrentTime());
  }

  /* ============================================================
     SONG INFO PANEL
     ============================================================ */
  function fmtBytes(n){
    if(n < 1024) return n + " B";
    if(n < 1024*1024) return (n/1024).toFixed(1) + " KB";
    return (n/(1024*1024)).toFixed(2) + " MB";
  }
  function infoRow(k, v){
    return '<div class="info-row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
  }
  function renderInfoPanel(info){
    const tempoStr = info.initialBpm + " BPM" + (info.tempoVaries ? " (varies, "+info.tempoChangeCount+" changes)" : "");
    let html = '<h3>'+ escapeHtml(info.title) +'</h3>';
    html += infoRow("File", escapeHtml(info.fileName) + " · " + fmtBytes(info.fileSize));
    html += infoRow("Duration", formatTime(info.duration));
    html += infoRow("Tempo", tempoStr);
    html += infoRow("Time signature", info.timeSignature);
    if(info.keySignature) html += infoRow("Key signature", info.keySignature);
    html += infoRow("Format", "Type " + info.format + " · " + info.numTracks + " track" + (info.numTracks===1?"":"s"));
    html += infoRow("Resolution", info.ticksPerQuarter + " ticks/quarter");
    html += infoRow("Notes", info.noteCount.toLocaleString());
    html += infoRow("Channels used", info.channelsUsed);
    infoPanel.innerHTML = html;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  }
  infoBtn.addEventListener("click", function(e){
    e.stopPropagation();
    infoPanel.classList.toggle("show");
  });
  document.addEventListener("click", function(e){
    if(infoPanel.classList.contains("show") && !infoPanel.contains(e.target) && e.target !== infoBtn){
      infoPanel.classList.remove("show");
    }
  });

  /* ============================================================
     CHANNEL MIXER (legend + mute/solo)
     ============================================================ */
  const MUTE_ICON = '<svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  const SOLO_ICON = '<svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>';

  function instrumentOptionsHtml(selectedProgram){
    let html = "";
    for(let p=0;p<128;p++){
      html += '<option value="'+p+'"'+(p===selectedProgram?' selected':'')+'>'+p+' — '+escapeHtml(GM_INSTRUMENTS[p])+'</option>';
    }
    return html;
  }

  function channelDisplayName(ch){
    if(isDrumChannel(ch)) return "Percussion";
    return GM_INSTRUMENTS[effectiveProgram(ch)] || ("Channel "+(ch+1));
  }

  // Full mixer controls (mute/solo/instrument/volume) — lives in the right sidebar.
  function buildLegend(notes, programByChannel){
    channelList = Array.from(new Set(notes.map(n=>n.channel))).sort((a,b)=>a-b);
    legendEl.innerHTML = "";
    channelList.forEach(ch=>{
      const color = CHANNEL_COLORS[ch % 16];
      const isPercChannel = ch === 9;
      const isDrum = isDrumChannel(ch);
      const name = channelDisplayName(ch);
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.dataset.channel = ch;
      chip.title = "Ch"+(ch+1)+" · "+name;
      chip.innerHTML =
        '<div class="chip-top">' +
          '<span class="sw" style="background:'+color.base+';color:'+color.base+'"></span>' +
          '<span class="chip-label">Ch'+(ch+1)+' · '+escapeHtml(name)+'</span>' +
          '<div class="chip-btns">' +
            '<button type="button" data-action="mute" data-channel="'+ch+'" title="Mute channel '+(ch+1)+'">'+MUTE_ICON+'</button>' +
            '<button type="button" data-action="solo" data-channel="'+ch+'" title="Solo channel '+(ch+1)+'">'+SOLO_ICON+'</button>' +
          '</div>' +
        '</div>' +
        '<div class="chip-mixer">' +
          (isPercChannel ?
            '<label class="chip-check-row">' +
              '<input type="checkbox" class="chip-melodic" data-channel="'+ch+'" '+(channelForceMelodic[9]?'checked':'')+'>' +
              '<span>Treat as melodic (non-standard file)</span>' +
            '</label>' : '') +
          '<div class="chip-mixer-row">' +
            '<label>Inst</label>' +
            '<select class="chip-inst" data-channel="'+ch+'" '+(isDrum?'disabled title="Percussion channel uses a drum kit — check \'Treat as melodic\' to override"':'')+'>'+instrumentOptionsHtml(effectiveProgram(ch))+'</select>' +
          '</div>' +
          '<div class="chip-mixer-row">' +
            '<label>Vol</label>' +
            '<input type="range" class="chip-vol" data-channel="'+ch+'" min="0" max="150" value="'+Math.round(channelVolumeFactor(ch)*100)+'">' +
            '<span class="chip-vol-val">'+Math.round(channelVolumeFactor(ch)*100)+'%</span>' +
          '</div>' +
          '<button type="button" class="chip-reset" data-action="reset" data-channel="'+ch+'">reset to default</button>' +
        '</div>';
      legendEl.appendChild(chip);
    });
    refreshChipStates();
  }

  function buildTrackLegend(tracks){
    trackLegendEl.innerHTML = "";
    tracks.forEach(tr=>{
      const color = CHANNEL_COLORS[tr.index % 16];
      const label = tr.name ? tr.name : ("Track "+(tr.index+1));
      const chChips = tr.channels.map(c => c===9 ? "Perc" : ("Ch"+(c+1))).join(", ");
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.dataset.track = tr.index;
      chip.title = "Track "+(tr.index+1)+" · "+label+" ("+tr.noteCount+" notes, "+(chChips||"—")+")";
      chip.innerHTML =
        '<div class="chip-top">' +
          '<span class="sw" style="background:'+color.base+';color:'+color.base+'"></span>' +
          '<span class="chip-label">Trk'+(tr.index+1)+' · '+escapeHtml(label)+'</span>' +
          '<div class="chip-btns">' +
            '<button type="button" data-action="track-mute" data-track="'+tr.index+'" title="Mute track '+(tr.index+1)+'">'+MUTE_ICON+'</button>' +
            '<button type="button" data-action="track-solo" data-track="'+tr.index+'" title="Solo track '+(tr.index+1)+'">'+SOLO_ICON+'</button>' +
          '</div>' +
        '</div>' +
        '<div class="chip-meta">'+tr.noteCount+' notes · '+(chChips||"no notes")+'</div>';
      trackLegendEl.appendChild(chip);
    });
    refreshTrackChipStates();
  }

  // Compact, read-only per-channel indicators shown in the main dock —
  // color + label + dim-when-inaudible only. All actual controls live in the sidebar.
  function buildChannelIndicators(){
    indicatorEl.innerHTML = "";
    channelList.forEach(ch=>{
      const color = CHANNEL_COLORS[ch % 16];
      const ind = document.createElement("div");
      ind.className = "ind-chip";
      ind.dataset.channel = ch;
      ind.innerHTML = '<span class="sw" style="background:'+color.base+';color:'+color.base+'"></span><span class="ind-label">Ch'+(ch+1)+'</span>';
      indicatorEl.appendChild(ind);
    });
    refreshIndicatorStates();
  }

  // A channel indicator should dim if the channel itself is muted/excluded-by-solo,
  // OR if every track feeding that channel is currently muted/excluded-by-solo.
  function channelHasAudibleTrack(ch){
    const relevant = trackList.filter(t => t.channels.indexOf(ch) !== -1);
    if(relevant.length === 0) return true;
    return relevant.some(t => isTrackAudible(t.index));
  }

  function refreshIndicatorStates(){
    indicatorEl.querySelectorAll(".ind-chip").forEach(ind=>{
      const ch = parseInt(ind.dataset.channel, 10);
      ind.title = "Ch"+(ch+1)+" · "+channelDisplayName(ch);
      ind.classList.toggle("inaudible", !isChannelAudible(ch) || !channelHasAudibleTrack(ch));
      const lbl = ind.querySelector(".ind-label");
      if(lbl) lbl.textContent = "Ch"+(ch+1);
    });
  }

  function refreshChipStates(){
    legendEl.querySelectorAll(".chip").forEach(chip=>{
      const ch = parseInt(chip.dataset.channel, 10);
      const muteBtn = chip.querySelector('[data-action="mute"]');
      const soloBtn = chip.querySelector('[data-action="solo"]');
      const muted = !!channelMuted[ch];
      const solo = !!channelSolo[ch];
      muteBtn.classList.toggle("active", muted);
      soloBtn.classList.toggle("active", solo);
      chip.classList.toggle("solo-active", solo);
      chip.classList.toggle("inaudible", !isChannelAudible(ch));
      chip.classList.toggle("overridden", instrumentOverride.hasOwnProperty(ch) || (channelVolume.hasOwnProperty(ch) && channelVolume[ch] !== 1));
      const label = chip.querySelector(".chip-label");
      if(label) label.textContent = "Ch"+(ch+1)+" · "+channelDisplayName(ch);
    });
    refreshIndicatorStates();
  }

  function refreshTrackChipStates(){
    trackLegendEl.querySelectorAll(".chip").forEach(chip=>{
      const tr = parseInt(chip.dataset.track, 10);
      const muteBtn = chip.querySelector('[data-action="track-mute"]');
      const soloBtn = chip.querySelector('[data-action="track-solo"]');
      const muted = !!trackMuted[tr];
      const solo = !!trackSolo[tr];
      muteBtn.classList.toggle("active", muted);
      soloBtn.classList.toggle("active", solo);
      chip.classList.toggle("solo-active", solo);
      chip.classList.toggle("inaudible", !isTrackAudible(tr));
    });
    // track mute/solo also affects overall per-channel audibility as heard/seen
    refreshIndicatorStates();
  }

  legendEl.addEventListener("click", function(e){
    const btn = e.target.closest("[data-action]");
    if(!btn) return;
    const ch = parseInt(btn.dataset.channel, 10);
    const chip = btn.closest(".chip");
    if(btn.dataset.action === "mute"){
      channelMuted[ch] = !channelMuted[ch];
      if(channelMuted[ch]) stopVoicesForChannel(ch);
    } else if(btn.dataset.action === "solo"){
      channelSolo[ch] = !channelSolo[ch];
      recomputeSoloFlag();
      if(anySolo){
        channelList.forEach(c=>{ if(!isChannelAudible(c)) stopVoicesForChannel(c); });
      }
    } else if(btn.dataset.action === "reset"){
      delete instrumentOverride[ch];
      delete channelVolume[ch];
      stopVoicesForChannel(ch);
      maybePrewarmSoundfont();
      const sel = chip.querySelector(".chip-inst");
      const vol = chip.querySelector(".chip-vol");
      const volVal = chip.querySelector(".chip-vol-val");
      if(sel) sel.value = String(effectiveProgram(ch));
      if(vol) vol.value = "100";
      if(volVal) volVal.textContent = "100%";
    }
    refreshChipStates();
  });

  legendEl.addEventListener("change", function(e){
    if(e.target.classList.contains("chip-inst")){
      const ch = parseInt(e.target.dataset.channel, 10);
      instrumentOverride[ch] = parseInt(e.target.value, 10);
      stopVoicesForChannel(ch);
      maybePrewarmSoundfont();
      refreshChipStates();
    } else if(e.target.classList.contains("chip-melodic")){
      channelForceMelodic[9] = e.target.checked;
      stopVoicesForChannel(9);
      maybePrewarmSoundfont();
      buildLegend(currentNotes, currentProgramByChannel);
      buildChannelIndicators();
    }
  });

  legendEl.addEventListener("input", function(e){
    if(e.target.classList.contains("chip-vol")){
      const ch = parseInt(e.target.dataset.channel, 10);
      const pct = parseInt(e.target.value, 10);
      channelVolume[ch] = pct/100;
      const chip = e.target.closest(".chip");
      const valEl = chip.querySelector(".chip-vol-val");
      if(valEl) valEl.textContent = pct + "%";
      chip.classList.toggle("overridden", instrumentOverride.hasOwnProperty(ch) || pct !== 100);
    }
  });

  trackLegendEl.addEventListener("click", function(e){
    const btn = e.target.closest("[data-action]");
    if(!btn) return;
    const tr = parseInt(btn.dataset.track, 10);
    if(btn.dataset.action === "track-mute"){
      trackMuted[tr] = !trackMuted[tr];
      if(trackMuted[tr]) stopVoicesForTrack(tr);
    } else if(btn.dataset.action === "track-solo"){
      trackSolo[tr] = !trackSolo[tr];
      recomputeTrackSoloFlag();
      if(anyTrackSolo){
        trackList.forEach(t => { if(!isTrackAudible(t.index)) stopVoicesForTrack(t.index); });
      }
    }
    refreshTrackChipStates();
  });

  mixerTabs.addEventListener("click", function(e){
    const btn = e.target.closest("button[data-tab]");
    if(!btn) return;
    mixerTab = btn.dataset.tab;
    mixerTabs.querySelectorAll("button[data-tab]").forEach(b => b.classList.toggle("active", b === btn));
    legendEl.hidden = mixerTab !== "channels";
    trackLegendEl.hidden = mixerTab !== "tracks";
  });

  /* ---------- sidebar show / hide ---------- */
  function setSidebarOpen(open){
    sidebar.classList.toggle("show", open);
    sidebarToggleBtn.classList.toggle("active", open);
    // sidebar width change resizes the canvas area; wait for the slide
    // transition to (mostly) finish before recalculating layout.
    requestAnimationFrame(resizeCanvas);
    setTimeout(resizeCanvas, 220);
  }
  sidebarToggleBtn.addEventListener("click", function(){
    setSidebarOpen(!sidebar.classList.contains("show"));
  });
  sidebarCloseBtn.addEventListener("click", function(){ setSidebarOpen(false); });
  indicatorEl.addEventListener("click", function(e){
    const ind = e.target.closest(".ind-chip");
    if(!ind) return;
    setSidebarOpen(true);
    mixerTabs.querySelector('button[data-tab="channels"]').click();
    const chip = legendEl.querySelector('.chip[data-channel="'+ind.dataset.channel+'"]');
    if(chip) chip.scrollIntoView({ block:"nearest", behavior:"smooth" });
  });

  /* ============================================================
     KEYBOARD LAYOUT
     ============================================================ */
  function isBlackNote(n){ const pc = n % 12; return pc===1||pc===3||pc===6||pc===8||pc===10; }

  function buildKeyLayout(totalSize){
    const layout = {};
    const whiteNotes = [];
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++) if(!isBlackNote(n)) whiteNotes.push(n);
    const whiteSize = totalSize / whiteNotes.length;
    const blackSize = whiteSize * 0.6;
    let wi = 0;
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      if(!isBlackNote(n)){
        layout[n] = { pos: wi*whiteSize, size: whiteSize, black:false };
        wi++;
      } else {
        layout[n] = { pos: wi*whiteSize - blackSize/2, size: blackSize, black:true };
      }
    }
    return layout;
  }

  function roundRect(c, x, y, w, h, r){
    if(w <= 0 || h <= 0) return;
    r = Math.min(r, w/2, h/2);
    c.beginPath();
    c.moveTo(x+r, y);
    c.arcTo(x+w, y, x+w, y+h, r);
    c.arcTo(x+w, y+h, x, y+h, r);
    c.arcTo(x, y+h, x, y, r);
    c.arcTo(x, y, x+w, y, r);
    c.closePath();
  }

  /* ============================================================
     RENDER
     ============================================================ */
  function render(t){
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);
    if(!fileLoaded) return;
    if(orientation === "horizontal") drawHorizontal(t, w, h);
    else drawVertical(t, w, h);
  }

  function drawHorizontal(t, w, h){
    const keyboardHeight = Math.max(70, Math.min(130, h*0.22));
    const strikeY = h - keyboardHeight;
    if(!keyLayoutCache.h || keyLayoutCache.hw !== w){ keyLayoutCache.h = buildKeyLayout(w); keyLayoutCache.hw = w; }
    const layout = keyLayoutCache.h;
    const pxPerSec = strikeY / LOOKAHEAD_VISUAL;

    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      if(n % 12 === 0){
        const x = layout[n].pos;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, strikeY); ctx.stroke();
      }
    }
    ctx.restore();

    const activeColor = {};
    const activeChannels = new Set();

    for(const note of currentNotes){
      if(note.endTime < t-0.05) continue;
      if(note.startTime > t+LOOKAHEAD_VISUAL) break;
      const key = layout[note.note];
      if(!key) continue;
      const audible = isNoteAudible(note);
      const bottomY = strikeY - (note.startTime - t) * pxPerSec;
      const topY = strikeY - (note.endTime - t) * pxPerSec;
      const color = CHANNEL_COLORS[note.channel % 16];
      const isActive = note.startTime <= t && note.endTime > t;
      if(isActive && audible){ activeColor[note.note] = color; activeChannels.add(note.channel); }

      const barW = key.size * 0.8;
      const barX = key.pos + (key.size-barW)/2;
      const bh = Math.max(bottomY-topY, 3);
      const grad = ctx.createLinearGradient(0, topY, 0, topY+bh);
      grad.addColorStop(0, color.light);
      grad.addColorStop(1, color.base);
      ctx.globalAlpha = audible ? 1 : 0.12;
      ctx.fillStyle = grad;
      ctx.shadowBlur = (isActive && audible) ? 16 : 0;
      ctx.shadowColor = color.base;
      roundRect(ctx, barX, topY, barW, bh, 4);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.strokeStyle = COLORS.strikeLine;
    ctx.lineWidth = 2;
    ctx.shadowColor = COLORS.strikeLine;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(0, strikeY); ctx.lineTo(w, strikeY); ctx.stroke();
    ctx.restore();

    drawKeysHorizontal(layout, strikeY, keyboardHeight, activeColor);
    updateActiveChannelDisplay(activeChannels);
  }

  function drawKeysHorizontal(layout, topY, height, activeColor){
    ctx.save();
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      const k = layout[n]; if(k.black) continue;
      const active = activeColor[n];
      ctx.shadowBlur = active ? 18 : 0;
      ctx.shadowColor = active ? active.base : "transparent";
      ctx.fillStyle = active ? active.base : COLORS.whiteKey;
      ctx.fillRect(k.pos, topY, k.size-1, height);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = COLORS.keyBorder;
      ctx.lineWidth = 1;
      ctx.strokeRect(k.pos, topY, k.size-1, height);
    }
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      const k = layout[n]; if(!k.black) continue;
      const active = activeColor[n];
      ctx.shadowBlur = active ? 18 : 0;
      ctx.shadowColor = active ? active.base : "transparent";
      ctx.fillStyle = active ? active.light : COLORS.blackKey;
      ctx.fillRect(k.pos, topY, k.size, height*0.62);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(0,0,0,0.6)";
      ctx.strokeRect(k.pos, topY, k.size, height*0.62);
    }
    ctx.restore();
  }

  function drawVertical(t, w, h){
    const keyboardWidth = Math.max(70, Math.min(130, w*0.22));
    const strikeX = keyboardWidth;
    if(!keyLayoutCache.v || keyLayoutCache.vh !== h){ keyLayoutCache.v = buildKeyLayout(h); keyLayoutCache.vh = h; }
    const layout = keyLayoutCache.v;
    const pxPerSec = (w - strikeX) / LOOKAHEAD_VISUAL;

    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      if(n % 12 === 0){
        const y = h - layout[n].pos - layout[n].size;
        ctx.beginPath(); ctx.moveTo(strikeX, y); ctx.lineTo(w, y); ctx.stroke();
      }
    }
    ctx.restore();

    const activeColor = {};
    const activeChannels = new Set();

    for(const note of currentNotes){
      if(note.endTime < t-0.05) continue;
      if(note.startTime > t+LOOKAHEAD_VISUAL) break;
      const key = layout[note.note];
      if(!key) continue;
      const audible = isNoteAudible(note);
      const yTop = h - key.pos - key.size;
      const leftX = strikeX + (note.startTime - t) * pxPerSec;
      const rightX = strikeX + (note.endTime - t) * pxPerSec;
      const color = CHANNEL_COLORS[note.channel % 16];
      const isActive = note.startTime <= t && note.endTime > t;
      if(isActive && audible){ activeColor[note.note] = color; activeChannels.add(note.channel); }

      const barH = key.size * 0.8;
      const barY = yTop + (key.size-barH)/2;
      const bw = Math.max(rightX-leftX, 3);
      const grad = ctx.createLinearGradient(leftX, 0, leftX+bw, 0);
      grad.addColorStop(0, color.base);
      grad.addColorStop(1, color.light);
      ctx.globalAlpha = audible ? 1 : 0.12;
      ctx.fillStyle = grad;
      ctx.shadowBlur = (isActive && audible) ? 16 : 0;
      ctx.shadowColor = color.base;
      roundRect(ctx, leftX, barY, bw, barH, 4);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.strokeStyle = COLORS.strikeLine;
    ctx.lineWidth = 2;
    ctx.shadowColor = COLORS.strikeLine;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(strikeX, 0); ctx.lineTo(strikeX, h); ctx.stroke();
    ctx.restore();

    drawKeysVertical(layout, strikeX, keyboardWidth, h, activeColor);
    updateActiveChannelDisplay(activeChannels);
  }

  function drawKeysVertical(layout, rightX, width, h, activeColor){
    ctx.save();
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      const k = layout[n]; if(k.black) continue;
      const y = h - k.pos - k.size;
      const active = activeColor[n];
      ctx.shadowBlur = active ? 18 : 0;
      ctx.shadowColor = active ? active.base : "transparent";
      ctx.fillStyle = active ? active.base : COLORS.whiteKey;
      ctx.fillRect(0, y, width, k.size-1);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = COLORS.keyBorder;
      ctx.strokeRect(0, y, width, k.size-1);
    }
    for(let n=LOW_NOTE; n<=HIGH_NOTE; n++){
      const k = layout[n]; if(!k.black) continue;
      const y = h - k.pos - k.size;
      const active = activeColor[n];
      ctx.shadowBlur = active ? 18 : 0;
      ctx.shadowColor = active ? active.base : "transparent";
      ctx.fillStyle = active ? active.light : COLORS.blackKey;
      ctx.fillRect(0, y, width*0.62, k.size);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(0,0,0,0.6)";
      ctx.strokeRect(0, y, width*0.62, k.size);
    }
    ctx.restore();
  }

  let lastActiveChannelsKey = "";
  function updateActiveChannelDisplay(activeSet){
    const key = Array.from(activeSet).sort().join(",");
    if(key === lastActiveChannelsKey) return;
    lastActiveChannelsKey = key;
    legendEl.querySelectorAll(".chip").forEach(chip=>{
      const ch = parseInt(chip.dataset.channel, 10);
      chip.style.boxShadow = activeSet.has(ch) ? ("0 0 0 1px "+CHANNEL_COLORS[ch%16].base+", 0 0 14px -2px "+CHANNEL_COLORS[ch%16].base) : "none";
    });
    indicatorEl.querySelectorAll(".ind-chip").forEach(ind=>{
      const ch = parseInt(ind.dataset.channel, 10);
      const active = activeSet.has(ch);
      ind.classList.toggle("active", active);
      ind.style.boxShadow = active ? ("0 0 0 1px "+CHANNEL_COLORS[ch%16].base+", 0 0 10px -2px "+CHANNEL_COLORS[ch%16].base) : "none";
    });
  }

  /* ============================================================
     CANVAS RESIZE
     ============================================================ */
  function resizeCanvas(){
    const rect = vizContainer.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    keyLayoutCache = {};
    render(getCurrentTime());
  }
  window.addEventListener("resize", resizeCanvas);

  /* ============================================================
     UI WIRING
     ============================================================ */
  fileInput.addEventListener("change", function(){
    if(fileInput.files && fileInput.files[0]) loadMidiFile(fileInput.files[0]);
  });

  sfInput.addEventListener("change", function(){
    if(sfInput.files && sfInput.files[0]) loadSoundfontFile(sfInput.files[0]);
  });
  engineBuiltinBtn.addEventListener("click", function(){ setEngine("builtin"); });
  engineSfBtn.addEventListener("click", function(){ if(sfReady) setEngine("soundfont"); });

  ["dragenter","dragover"].forEach(evt=>{
    document.addEventListener(evt, function(e){ e.preventDefault(); dropzone.classList.add("drag-over"); });
  });
  ["dragleave","drop"].forEach(evt=>{
    document.addEventListener(evt, function(e){ e.preventDefault(); dropzone.classList.remove("drag-over"); });
  });
  document.addEventListener("drop", function(e){
    e.preventDefault();
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if(file) loadMidiFile(file);
  });

  playBtn.addEventListener("click", togglePlay);
  stopBtn.addEventListener("click", stopPlayback);

  let seeking = false;
  let wasPlayingBeforeSeek = false;
  seekSlider.addEventListener("pointerdown", function(){
    seeking = true;
    wasPlayingBeforeSeek = isPlaying;
    if(isPlaying) pause();
  });
  seekSlider.addEventListener("input", function(){
    const tsec = seekSlider.value/1000;
    playStartOffset = tsec;
    render(tsec);
    updateTimeLabels(tsec);
  });
  seekSlider.addEventListener("change", function(){
    seeking = false;
    if(wasPlayingBeforeSeek) play();
  });

  speedSlider.addEventListener("input", function(){
    const v = parseInt(speedSlider.value,10)/100;
    speedVal.textContent = v.toFixed(2)+"×";
    setSpeed(v);
  });

  volSlider.addEventListener("input", function(){
    volume = parseInt(volSlider.value,10)/100;
    volVal.textContent = volSlider.value+"%";
    if(masterGain) masterGain.gain.value = volume;
  });

  orientHorizBtn.addEventListener("click", function(){
    orientation = "horizontal";
    orientHorizBtn.classList.add("active");
    orientVertBtn.classList.remove("active");
    render(getCurrentTime());
  });
  orientVertBtn.addEventListener("click", function(){
    orientation = "vertical";
    orientVertBtn.classList.add("active");
    orientHorizBtn.classList.remove("active");
    render(getCurrentTime());
  });

  document.addEventListener("keydown", function(e){
    const tag = (e.target && e.target.tagName) || "";
    if(tag === "INPUT" || tag === "TEXTAREA") return;
    if(e.code === "Space"){ e.preventDefault(); if(fileLoaded) togglePlay(); }
    else if(e.code === "ArrowRight"){
      if(fileLoaded){
        const t=Math.min(songDuration, getCurrentTime()+5);
        if(isPlaying) startScheduler(t); else playStartOffset=t;
        render(t); updateTimeLabels(t); seekSlider.value=t*1000;
      }
    } else if(e.code === "ArrowLeft"){
      if(fileLoaded){
        const t=Math.max(0, getCurrentTime()-5);
        if(isPlaying) startScheduler(t); else playStartOffset=t;
        render(t); updateTimeLabels(t); seekSlider.value=t*1000;
      }
    }
  });

  /* ============================================================
     INIT
     ============================================================ */
  resizeCanvas();
  updatePlayButton();
})();
</script>
</body>
