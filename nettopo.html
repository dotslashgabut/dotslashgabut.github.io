                    if (d.y - r < minY) minY = d.y - r;
                    if (d.x + r > maxX) maxX = d.x + r;
                    if (d.y + r > maxY) maxY = d.y + r;
                    if (d.y + r + 30 > maxY) maxY = d.y + r + 30;
                }
                for (var i = 0; i < cabs.length; i++) {
                    var c = cabs[i],
                        a = getDeviceById(c.from),
                        b = getDeviceById(c.to);
                    if (a) { if (a.x < minX) minX = a.x;
                        if (a.y < minY) minY = a.y;
                        if (a.x > maxX) maxX = a.x;
                        if (a.y > maxY) maxY = a.y; }
                    if (b) { if (b.x < minX) minX = b.x;
                        if (b.y < minY) minY = b.y;
                        if (b.x > maxX) maxX = b.x;
                        if (b.y > maxY) maxY = b.y; }
                }
                var padding = 80;
                minX -= padding;
                minY -= padding;
                maxX += padding;
                maxY += padding;
                var tw = maxX - minX,
                    th = maxY - minY;
                var scale = 2;
                var w = Math.ceil(tw * scale),
                    h = Math.ceil(th * scale);
                var off = document.createElement('canvas');
                off.width = w;
                off.height = h;
                var ox = off.getContext('2d');

                ox.fillStyle = '#ffffff';
                ox.fillRect(0, 0, w, h);

                var savedPX = pX,
                    savedPY = pY,
                    savedZM = zm;
                var savedW = cW,
                    savedH = cH,
                    savedDP = dp;
                var savedCV = cv,
                    savedCX = cx;

                cv = off;
                cx = ox;
                cW = w;
                cH = h;
                dp = 1;
                pX = -minX * scale;
                pY = -minY * scale;
                zm = scale;

                __exportMode = true;
                __exportTheme = 'light';
                ren();
                __exportMode = false;

                cv = savedCV;
                cx = savedCX;
                cW = savedW;
                cH = savedH;
                dp = savedDP;
                pX = savedPX;
                pY = savedPY;
                zm = savedZM;

                var imgData = off.toDataURL('image/png', 0.95);

                // === PAGE 1: TOPOLOGY ===
                doc.setFontSize(16);
                doc.setTextColor('#000000');
                doc.text('NetTopo - Network Topology Report', pageWidth / 2, margin + 5, { align: 'center' });
                doc.setFontSize(8);
                doc.setTextColor('#000000');
                doc.text('Generated: ' + new Date().toLocaleString(), pageWidth / 2, margin + 10, { align: 'center' });

                var maxW = pageWidth - 2 * margin,
                    maxH = pageHeight - 2 * margin - 25;
                var iw = tw,
                    ih = th;
                var s = Math.min(maxW / iw, maxH / ih);
                iw *= s;
                ih *= s;
                doc.addImage(imgData, 'PNG', (pageWidth - iw) / 2, margin + 15, iw, ih);

                // === PAGE 2: DEVICE LIST ===
                doc.addPage();
                doc.setFontSize(14);
                doc.setTextColor('#000000');
                doc.text('Device List', margin, margin + 5);

                var deviceRows = [];
                for (var i = 0; i < devs.length; i++) {
                    var d = devs[i];
                    var cc = 0;
                    for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) cc++; }
                    var statusLabel = d.status.charAt(0).toUpperCase() + d.status.slice(1);
                    var cidr = maskToCidr(d.subnet) || '24';
                    var opMode = d.operationMode || '';
                    var ssidCount = (d.ssidProfiles || []).length;
                    var pppoeCount = (d.pppoeProfiles || []).length;
                    var vlanCount = (d.vlanProfiles || []).length;
                    var extra = '';
                    if (ssidCount) extra += ' SSID:' + ssidCount;
                    if (pppoeCount) extra += ' PPPoE:' + pppoeCount;
                    if (vlanCount) extra += ' VLAN:' + vlanCount;
                    deviceRows.push([d.name, DT[d.type].lb, statusLabel, d.ip + '/' + cidr, d.ports.toString(), cc
                        .toString(), opMode + extra
                    ]);
                }
                doc.autoTable({
                    startY: margin + 10,
                    head: [
                        ['Name', 'Type', 'Status', 'IP/CIDR', 'Ports', 'Links', 'Profiles']
                    ],
                    body: deviceRows,
                    theme: 'plain',
                    styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2, fontSize: 7,
                        cellPadding: 1.5, fillColor: '#ffffff' },
                    headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 7, fontStyle: 'bold',
                        halign: 'center' },
                    alternateRowStyles: { fillColor: '#f8fafc' },
                    margin: { left: margin, right: margin },
                    tableWidth: pageWidth - 2 * margin,
                });

                var afterDeviceY = doc.lastAutoTable ? doc.lastAutoTable.finalY : (margin + 10 + deviceRows.length *
                5);
                var spacing = 8;

                // === PAGE 3: CABLE CONNECTIONS ===
                if (cabs.length > 0) {
                    var connRows = [];
                    for (var i = 0; i < cabs.length; i++) {
                        var c = cabs[i],
                            a = getDeviceById(c.from),
                            b = getDeviceById(c.to);
                        var an = a ? a.name : '?',
                            bn = b ? b.name : '?';
                        var statusLabel = c.status.charAt(0).toUpperCase() + c.status.slice(1);
                        var extraInfo = [];
                        if (c.type === 'wireless' && c.ssid) extraInfo.push('SSID:' + c.ssid);
                        if (c.pppoe) extraInfo.push('PPPoE:' + c.pppoe);
                        if (c.vlanSource) extraInfo.push('VLANsrc:' + c.vlanSource);
                        if (c.vlanDest) extraInfo.push('VLANdst:' + c.vlanDest);
                        var extraStr = extraInfo.length ? extraInfo.join(' ') : '';
                        connRows.push([
                            c.name || 'Cable',
                            an + ' (P' + c.fromPort + ')',
                            bn + ' (P' + c.toPort + ')',
                            CT[c.type].lb,
                            c.bw + 'Mbps',
                            statusLabel,
                            extraStr
                        ]);
                    }
                    var estimatedHeight = connRows.length * 4 + 20;
                    var remaining = pageHeight - afterDeviceY - margin - 20;
                    if (estimatedHeight < remaining) {
                        doc.setFontSize(14);
                        doc.setTextColor('#000000');
                        doc.text('Cable Connections', margin, afterDeviceY + spacing);
                        doc.autoTable({
                            startY: afterDeviceY + spacing + 5,
                            head: [
                                ['Name', 'From', 'To', 'Type', 'Bandwidth', 'Status', 'Extra']
                            ],
                            body: connRows,
                            theme: 'plain',
                            styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2,
                                fontSize: 6.5, cellPadding: 1.5, fillColor: '#ffffff' },
                            headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 6.5,
                                fontStyle: 'bold', halign: 'center' },
                            alternateRowStyles: { fillColor: '#f8fafc' },
                            margin: { left: margin, right: margin },
                            tableWidth: pageWidth - 2 * margin,
                        });
                    } else {
                        doc.addPage();
                        doc.setFontSize(14);
                        doc.setTextColor('#000000');
                        doc.text('Cable Connections', margin, margin + 5);
                        doc.autoTable({
                            startY: margin + 10,
                            head: [
                                ['Name', 'From', 'To', 'Type', 'Bandwidth', 'Status', 'Extra']
                            ],
                            body: connRows,
                            theme: 'plain',
                            styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.2,
                                fontSize: 6.5, cellPadding: 1.5, fillColor: '#ffffff' },
                            headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 6.5,
                                fontStyle: 'bold', halign: 'center' },
                            alternateRowStyles: { fillColor: '#f8fafc' },
                            margin: { left: margin, right: margin },
                            tableWidth: pageWidth - 2 * margin,
                        });
                    }
                }

                // === PAGE 4+: DEVICE DETAILS (selected) ===
                if (sDI !== null) {
                    var selDev = getDeviceById(sDI);
                    if (selDev) {
                        generateDeviceDetailsPage(doc, selDev, pageWidth, pageHeight, margin);
                    }
                }

                doc.save('nettopo-report-' + new Date().toISOString().slice(0, 10) + '.pdf');
                toast('PDF (Full) exported successfully!', 'ok');

            } catch (err) {
                console.error('PDF Error:', err);
                toast('PDF export failed: ' + err.message, 'er');
            }
        }

        // === HELPER: GENERATE DEVICE DETAILS PAGE (with fix for position overlap) ===
        function generateDeviceDetailsPage(doc, dev, pageWidth, pageHeight, margin, addNewPage) {
            if (addNewPage === undefined) addNewPage = true;

            var cidr = maskToCidr(dev.subnet) || '24';
            var used = usedPorts(dev.id, -1);
            var usedCount = Object.keys(used).length;
            var freeCount = dev.ports - usedCount;
            var portPct = dev.ports > 0 ? Math.round(usedCount / dev.ports * 100) : 0;
            var t = DT[dev.type];

            if (addNewPage) {
                doc.addPage();
            }

            doc.setFontSize(18);
            doc.setTextColor('#000000');
            doc.text('Device Details - ' + dev.name, pageWidth / 2, margin + 5, { align: 'center' });
            doc.setFontSize(10);
            doc.setTextColor('#000000');
            doc.text('Generated: ' + new Date().toLocaleString(), pageWidth / 2, margin + 11, { align: 'center' });

            var y = margin + 20;
            doc.setFontSize(12);
            doc.setTextColor('#000000');
            doc.setFont('helvetica', 'bold');
            doc.text(dev.name, margin, y);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            doc.text('Type: ' + t.lb, margin, y + 5);
            doc.text('Status: ' + dev.status.charAt(0).toUpperCase() + dev.status.slice(1), margin, y + 10);
            if (dev.operationMode) {
                doc.text('Operation Mode: ' + dev.operationMode, margin, y + 15);
                y += 5;
            }
            y += 20;

            // === Network Configuration ===
            doc.setFontSize(10);
            doc.setTextColor('#000000');
            doc.setFont('helvetica', 'bold');
            doc.text('Network Configuration', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            y += 5;

            var netData = [
                ['IP Address:', dev.ip],
                ['CIDR:', '/' + cidr],
                ['Subnet Mask:', dev.subnet],
                ['Gateway:', dev.gateway],
                ['MAC Address:', dev.mac],
                ['Uptime:', dev.uptime]
            ];
            for (var i = 0; i < netData.length; i++) {
                doc.text(netData[i][0] + ' ' + netData[i][1], margin, y);
                y += 5;
            }

            // === LAN ===
            if (dev.lan && (dev.lan.ip || dev.lan.subnet || dev.lan.cidr)) {
                var lan = dev.lan;
                doc.setFont('helvetica', 'bold');
                doc.text('LAN', margin, y);
                doc.setFont('helvetica', 'normal');
                y += 5;
                if (lan.ip) { doc.text('IP: ' + lan.ip, margin + 5, y);
                    y += 4.5; }
                if (lan.subnet) { doc.text('Subnet: ' + lan.subnet, margin + 5, y);
                    y += 4.5; }
                if (lan.cidr) { doc.text('CIDR: ' + lan.cidr, margin + 5, y);
                    y += 4.5; }
                y += 3;
            }

            // === DHCP ===
            if (dev.dhcp && (dev.dhcp.startIP || dev.dhcp.endIP || dev.dhcp.gateway)) {
                var dhcp = dev.dhcp;
                doc.setFont('helvetica', 'bold');
                doc.text('DHCP Server', margin, y);
                doc.setFont('helvetica', 'normal');
                y += 5;
                if (dhcp.startIP) { doc.text('Start IP: ' + dhcp.startIP, margin + 5, y);
                    y += 4.5; }
                if (dhcp.endIP) { doc.text('End IP: ' + dhcp.endIP, margin + 5, y);
                    y += 4.5; }
                if (dhcp.gateway) { doc.text('Gateway: ' + dhcp.gateway, margin + 5, y);
                    y += 4.5; }
                if (dhcp.domain) { doc.text('Domain: ' + dhcp.domain, margin + 5, y);
                    y += 4.5; }
                if (dhcp.primaryDNS) { doc.text('Primary DNS: ' + dhcp.primaryDNS, margin + 5, y);
                    y += 4.5; }
                if (dhcp.secondaryDNS) { doc.text('Secondary DNS: ' + dhcp.secondaryDNS, margin + 5, y);
                    y += 4.5; }
                y += 3;
            }

            // === Notes ===
            if (dev.notes && dev.notes.trim()) {
                doc.setFont('helvetica', 'bold');
                doc.text('Notes:', margin, y);
                doc.setFont('helvetica', 'normal');
                y += 4.5;
                var noteLines = dev.notes.split('\n');
                for (var i = 0; i < noteLines.length; i++) {
                    var line = noteLines[i].trim();
                    if (line) {
                        var maxWidth = pageWidth - 2 * margin - 10;
                        var words = line.split(' ');
                        var currentLine = '';
                        for (var j = 0; j < words.length; j++) {
                            var testLine = currentLine + (currentLine ? ' ' : '') + words[j];
                            var testWidth = doc.getTextWidth(testLine);
                            if (testWidth > maxWidth && currentLine) {
                                doc.text(currentLine, margin + 5, y);
                                y += 4.5;
                                currentLine = words[j];
                            } else {
                                currentLine = testLine;
                            }
                        }
                        if (currentLine) {
                            doc.text(currentLine, margin + 5, y);
                            y += 4.5;
                        }
                    }
                }
                y += 3;
            }

            // === Port Statistics ===
            doc.setFontSize(10);
            doc.setTextColor('#000000');
            doc.setFont('helvetica', 'bold');
            doc.text('Port Statistics', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            y += 5;
            doc.text('Total Ports: ' + dev.ports, margin, y);
            y += 4.5;
            doc.text('Used Ports: ' + usedCount + ' (' + portPct + '%)', margin, y);
            y += 4.5;
            doc.text('Free Ports: ' + freeCount, margin, y);
            y += 5;

            // === Port Grid ===
            var gridStartX = margin;
            var gridStartY = y;
            var cellSize = 4.2;
            var gap = 0.8;
            var colsPerRow = 8;
            var totalCols = dev.ports;
            var rows = Math.ceil(totalCols / colsPerRow);

            var gridW = colsPerRow * (cellSize + gap) - gap;
            var gridH = rows * (cellSize + gap) - gap;
            doc.setDrawColor(136, 136, 136);
            doc.setLineWidth(0.1);
            doc.roundedRect(gridStartX - 1, gridStartY - 1, gridW + 2, gridH + 2, 0.5, 0.5);

            for (var p = 1; p <= dev.ports; p++) {
                var col = (p - 1) % colsPerRow;
                var row = Math.floor((p - 1) / colsPerRow);
                var cx = gridStartX + col * (cellSize + gap);
                var cy = gridStartY + row * (cellSize + gap);

                var cable = getCableOnPort(dev.id, p);
                var isUsed = cable ? true : false;
                var cableStatus = cable ? cable.status : null;

                var fillColor;
                if (!isUsed) {
                    fillColor = [220, 220, 220];
                } else {
                    if (cableStatus === 'active') fillColor = [0, 212, 142];
                    else if (cableStatus === 'degraded') fillColor = [255, 167, 38];
                    else fillColor = [255, 71, 87];
                }

                doc.setFillColor(fillColor[0], fillColor[1], fillColor[2]);
                doc.rect(cx, cy, cellSize, cellSize, 'F');

                doc.setDrawColor(42, 51, 72);
                doc.setLineWidth(0.1);
                doc.rect(cx, cy, cellSize, cellSize, 'S');

                doc.setTextColor(30, 30, 30);
                doc.setFontSize(3.5);
                doc.text(String(p), cx + cellSize / 2, cy + cellSize / 2 + 1, { align: 'center' });
            }

            y = gridStartY + gridH + 8;

            // === Legend ===
            doc.setFontSize(8);
            doc.setTextColor('#000000');
            doc.setFont('helvetica', 'bold');
            doc.text('Legend:', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(7);
            y += 4.5;

            var legendItems = [
                ['Active', [0, 212, 142]],
                ['Degraded', [255, 167, 38]],
                ['Down', [255, 71, 87]],
                ['Empty', [220, 220, 220]]
            ];
            var lx = margin;
            for (var i = 0; i < legendItems.length; i++) {
                doc.setFillColor(legendItems[i][1][0], legendItems[i][1][1], legendItems[i][1][2]);
                doc.rect(lx, y - 2, 3, 3, 'F');
                doc.setDrawColor(42, 51, 72);
                doc.setLineWidth(0.05);
                doc.rect(lx, y - 2, 3, 3, 'S');
                doc.setTextColor(0, 0, 0);
                doc.text(legendItems[i][0], lx + 5, y + 0.5);
                lx += 22;
            }
            y += 6;

            // === Port Types Detail ===
            var portTypes = dev.portTypes || [];
            var hasPortTypes = false;
            for (var i = 0; i < portTypes.length; i++) {
                if (portTypes[i] && (portTypes[i].type || portTypes[i].vlan)) { hasPortTypes = true; break; }
            }
            if (hasPortTypes) {
                doc.setFontSize(10);
                doc.setTextColor('#000000');
                doc.setFont('helvetica', 'bold');
                doc.text('Port Types Detail', margin, y);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                y += 5;

                var typeLabels = { ethernet: 'Ethernet', fiber: 'Fiber', wireless: 'Wireless', other: 'Other' };
                var totalPorts = dev.ports;
                var cols = 4;
                var rowsPerCol = 8;
                var portsPerBlock = cols * rowsPerCol;
                var spacing = 4;
                var colWidth = (pageWidth - 2 * margin - (cols - 1) * spacing) / cols;

                for (var startP = 1; startP <= totalPorts; startP += portsPerBlock) {
                    var rowY = y;
                    for (var row = 0; row < rowsPerCol; row++) {
                        for (var col = 0; col < cols; col++) {
                            var portNum = startP + col * rowsPerCol + row;
                            if (portNum <= totalPorts) {
                                var cable = getCableOnPort(dev.id, portNum);
                                var isUsed = cable ? true : false;
                                var cableType = cable ? cable.type : null;
                                var ptObj = getPortTypeObj(dev, portNum);
                                var pt = ptObj ? ptObj.type : null;
                                var vlan = ptObj ? ptObj.vlan : '';
                                var displayType = cableType || pt;
                                var typeLabel = displayType ? (typeLabels[displayType] || displayType) : 'Empty';
                                var statusLabel = isUsed ? 'Used' : 'Empty';
                                var label = 'P' + portNum + ': ' + typeLabel + (vlan ? ' VLAN:' + vlan : '') +
                                    ' (' + statusLabel + ')';
                                var xPos = margin + col * (colWidth + spacing);
                                doc.text(label, xPos, rowY);
                            }
                        }
                        rowY += 4.5;
                        if (rowY > pageHeight - margin - 10) {
                            doc.addPage();
                            rowY = margin + 10;
                            doc.setFontSize(10);
                            doc.setTextColor('#000000');
                            doc.setFont('helvetica', 'bold');
                            doc.text('Port Types Detail (continued)', margin, rowY);
                            doc.setFont('helvetica', 'normal');
                            doc.setFontSize(7);
                            rowY += 5;
                        }
                    }
                    y = rowY + 3;
                }
                y += 3;
            }

            // === SSID Profiles ===
            var ssids = dev.ssidProfiles || [];
            if (ssids.length > 0) {
                doc.setFontSize(10);
                doc.setTextColor('#000000');
                doc.setFont('helvetica', 'bold');
                doc.text('Access Point Settings (' + ssids.length + ' SSID)', margin, y);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                y += 5;
                for (var i = 0; i < ssids.length; i++) {
                    var sp = ssids[i];
                    var label = 'SSID #' + (i + 1) + ': ' + (sp.ssid || '(unnamed)') + ' | Password: ' + (sp
                        .password ? '••••••••' : '(none)');
                    doc.text(label, margin, y);
                    y += 4.5;
                    if (y > pageHeight - margin - 10) {
                        doc.addPage();
                        y = margin + 10;
                        doc.setFontSize(10);
                        doc.setTextColor('#000000');
                        doc.setFont('helvetica', 'bold');
                        doc.text('Access Point Settings (continued)', margin, y);
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7);
                        y += 5;
                    }
                }
                y += 3;
            }

            // === PPPoE Profiles ===
            var pppoes = dev.pppoeProfiles || [];
            if (pppoes.length > 0) {
                doc.setFontSize(10);
                doc.setTextColor('#000000');
                doc.setFont('helvetica', 'bold');
                doc.text('PPPoE Profiles (' + pppoes.length + ')', margin, y);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                y += 5;
                for (var i = 0; i < pppoes.length; i++) {
                    var pp = pppoes[i];
                    var label = 'PPPoE #' + (i + 1) + ': ' + (pp.username || '(unnamed)') + ' | Password: ' + (pp
                        .password ? '••••••••' : '(none)');
                    doc.text(label, margin, y);
                    y += 4.5;
                    if (y > pageHeight - margin - 10) {
                        doc.addPage();
                        y = margin + 10;
                        doc.setFontSize(10);
                        doc.setTextColor('#000000');
                        doc.setFont('helvetica', 'bold');
                        doc.text('PPPoE Profiles (continued)', margin, y);
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7);
                        y += 5;
                    }
                }
                y += 3;
            }

            // === VLAN Profiles ===
            var vlans = dev.vlanProfiles || [];
            if (vlans.length > 0) {
                doc.setFontSize(10);
                doc.setTextColor('#000000');
                doc.setFont('helvetica', 'bold');
                doc.text('VLAN Profiles (' + vlans.length + ')', margin, y);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                y += 5;
                for (var i = 0; i < vlans.length; i++) {
                    var vp = vlans[i];
                    var label = 'VLAN #' + (i + 1) + ': ID ' + (vp.vlanId || '(none)');
                    doc.text(label, margin, y);
                    y += 4.5;
                    if (y > pageHeight - margin - 10) {
                        doc.addPage();
                        y = margin + 10;
                        doc.setFontSize(10);
                        doc.setTextColor('#000000');
                        doc.setFont('helvetica', 'bold');
                        doc.text('VLAN Profiles (continued)', margin, y);
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7);
                        y += 5;
                    }
                }
                y += 3;
            }

            // === Performance ===
            doc.setFontSize(10);
            doc.setTextColor('#000000');
            doc.setFont('helvetica', 'bold');
            doc.text('Performance', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            y += 5;
            doc.text('CPU: ' + dev.cpu + '%', margin, y);
            y += 4.5;
            doc.text('Memory: ' + dev.mem + '%', margin, y);
            y += 4.5;
            doc.text('Temperature: ' + dev.temp + '\u00b0C', margin, y);
            y += 6;

            // === Connected Cables ===
            var connectedCables = getCablesForDevice(dev.id);
            if (connectedCables.length > 0) {
                doc.setFontSize(10);
                doc.setTextColor('#000000');
                doc.setFont('helvetica', 'bold');
                doc.text('Connected Cables (' + connectedCables.length + ')', margin, y);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                y += 5;

                var cabRows = [];
                for (var i = 0; i < connectedCables.length; i++) {
                    var c = connectedCables[i];
                    var other = getDeviceById(c.from === dev.id ? c.to : c.from);
                    var myP = c.from === dev.id ? c.fromPort : c.toPort;
                    var extraInfo = [];
                    if (c.type === 'wireless' && c.ssid) extraInfo.push('SSID:' + c.ssid);
                    if (c.vlanSource) extraInfo.push('VLANsrc:' + c.vlanSource);
                    if (c.vlanDest) extraInfo.push('VLANdst:' + c.vlanDest);
                    if (c.pppoe) extraInfo.push('PPPoE:' + c.pppoe);
                    var extraStr = extraInfo.length ? extraInfo.join(' ') : '';
                    cabRows.push([
                        (other ? other.name : '?') + ' (P' + myP + ')',
                        CT[c.type].lb,
                        c.bw + 'Mbps',
                        c.status,
                        extraStr
                    ]);
                }

                doc.autoTable({
                    startY: y,
                    head: [
                        ['Device (Port)', 'Type', 'Bandwidth', 'Status', 'Extra']
                    ],
                    body: cabRows,
                    theme: 'plain',
                    styles: { textColor: '#000000', lineColor: '#888888', lineWidth: 0.1, fontSize: 6.5,
                        cellPadding: 1.2, fillColor: '#ffffff' },
                    headStyles: { fillColor: '#e0e7ff', textColor: '#1e1b4b', fontSize: 6.5,
                    fontStyle: 'bold', halign: 'center' },
                    alternateRowStyles: { fillColor: '#f8fafc' },
                    margin: { left: margin, right: margin },
                    tableWidth: pageWidth - 2 * margin,
                });
                y = doc.lastAutoTable ? doc.lastAutoTable.finalY + 3 : y + 3;
            }

            // === Position (fix: add new page if not enough space) ===
            var posY = pageHeight - margin - 5;
            if (y + 10 > posY) {
                doc.addPage();
                y = margin + 10;
                posY = pageHeight - margin - 5;
            }
            doc.setFontSize(8);
            doc.setTextColor('#666666');
            doc.text('Position: (' + Math.round(dev.x) + ', ' + Math.round(dev.y) + ')', margin, posY);
        }

        // ===== PDF (SELECTED) =====
        document.getElementById('exPDFSelected').addEventListener('click', function() {
            if (sDI === null) {
                toast('Please select a device first', 'er');
                return;
            }
            var d = getDeviceById(sDI);
            if (!d) {
                toast('Selected device not found', 'er');
                return;
            }
            toast('Generating PDF for ' + d.name + '...', 'in');
            generateSelectedPDF(d);
        });

        function generateSelectedPDF(dev) {
            try {
                var { jsPDF } = window.jspdf;
                var doc = new jsPDF('p', 'mm', 'a4');
                var pageWidth = 210,
                    pageHeight = 297,
                    margin = 15;
                generateDeviceDetailsPage(doc, dev, pageWidth, pageHeight, margin, false);
                var filename = 'device-' + dev.name.replace(/\s+/g, '-') + '-' + new Date().toISOString().slice(0,
                    10) + '.pdf';
                doc.save(filename);
                toast('PDF (Selected) exported: ' + dev.name, 'ok');
            } catch (err) {
                console.error('PDF Selected Error:', err);
                toast('PDF (Selected) failed: ' + err.message, 'er');
            }
        }

        // ========== INIT ==========
        function init() {
            buildSB();
            rsz();
            _updateUndoRedoBtns();
            document.getElementById('bSnap').classList.add('snap-btn-active');
            document.getElementById('bSnap').classList.add('active');
            snapToGrid = true;
            requestAnimationFrame(loop);

            // Try to load from IndexedDB; fallback to sample
            loadFromIDB(function(saved) {
                if (saved && saved.devs && saved.devs.length > 0) {
                    devs = saved.devs; cabs = saved.cabs || [];
                    idC = saved.idC || 0; cidC = saved.cidC || 0;
                    _ssidCounter = saved._ssidCounter || 0;
                    _pppoeCounter = saved._pppoeCounter || 0;
                    _vlanCounter = saved._vlanCounter || 0;
                    if (saved.zm) { zm = saved.zm; pX = saved.pX; pY = saved.pY; firstRS = false; }
                    uUI(false);
                    toast('Data restored from storage', 'ok');
                } else {
                    loadSample();
                }
            });
        }
        init();
    </script>
</body>
</html>
