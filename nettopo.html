<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetTopo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@5.0.8/dist/jspdf.plugin.autotable.min.js"></script>
    </script>
    <style>
        /* (CSS sama seperti sebelumnya, tidak diubah) */
        :root {
            --bg: #0c0f14;
            --sf: #141820;
            --cd: #1c2230;
            --bd: #2a3348;
            --fg: #e4eaf2;
            --mt: #7b8ca3;
            --ac: #00d48e;
            --ad: rgba(0, 212, 142, .12);
            --dn: #ff4757;
            --wn: #ffa726;
            --in: #29b6f6;
            --pp: #a855f7;
            --pk: #f472b6;
            --cy: #22d3ee;
            --yl: #facc15;
            --or: #ff8a65;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }
        .app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 280px 1fr auto;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }
        .app.dp-collapsed {
            grid-template-columns: 280px 1fr 0px;
        }
        header {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: var(--sf);
            border-bottom: 1px solid var(--bd);
            gap: 10px;
            flex-wrap: nowrap;
            min-height: 60px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo i {
            color: var(--ac);
            font-size: 20px;
        }
        .logo span {
            color: var(--mt);
            font-weight: 400;
            font-size: 13px;
            display: none;
        }
        .hc {
            display: flex;
            gap: 4px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 4px;
            flex-shrink: 0;
        }
        .mb {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            background: 0;
            color: var(--mt);
            font: 600 12px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .mb:hover {
            color: var(--fg);
        }
        .mb.a {
            background: var(--ac);
            color: var(--bg);
        }
        .mb.ac2 {
            background: var(--in);
            color: var(--bg);
        }
        .mb.ad {
            background: var(--dn);
            color: #fff;
        }
        .hs {
            display: flex;
            gap: 14px;
            flex-shrink: 0;
        }
        .hi {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--mt);
            white-space: nowrap;
        }
        .hi .v {
            font: 500 12px/1 'JetBrains Mono', monospace;
            color: var(--fg);
        }
        .d5 {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .d5o {
            background: var(--ac);
            box-shadow: 0 0 5px var(--ac);
        }
        .d5w {
            background: var(--wn);
            box-shadow: 0 0 5px var(--wn);
        }
        .d5f {
            background: var(--dn);
            box-shadow: 0 0 5px var(--dn);
        }
        .ha {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }
        .bt {
            padding: 7px 13px;
            border: 1px solid var(--bd);
            border-radius: 6px;
            background: var(--cd);
            color: var(--fg);
            font: 500 12px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .bt:hover {
            border-color: var(--ac);
            color: var(--ac);
        }
        .bp {
            background: var(--ac);
            color: var(--bg);
            border-color: var(--ac);
            font-weight: 700;
        }
        .bp:hover {
            background: #00b87a;
            color: var(--bg);
        }
        .btd {
            border-color: var(--dn);
            color: var(--dn);
        }
        .btd:hover {
            background: rgba(255, 71, 87, .1);
        }
        .btx {
            border-color: var(--pp);
            color: var(--pp);
        }
        .btx:hover {
            background: rgba(168, 85, 247, .1);
            border-color: var(--pp);
            color: var(--pp);
        }
        .btj {
            border-color: var(--cy);
            color: var(--cy);
        }
        .btj:hover {
            background: rgba(34, 211, 238, .1);
            border-color: var(--cy);
            color: var(--cy);
        }
        .bt-snap {
            border-color: var(--yl);
            color: var(--yl);
        }
        .bt-snap:hover {
            background: rgba(250, 204, 21, .1);
            border-color: var(--yl);
            color: var(--yl);
        }
        .bt-snap.active {
            background: var(--yl);
            color: var(--bg);
            border-color: var(--yl);
        }
        .bt-snap.active:hover {
            background: #e6b800;
            color: var(--bg);
        }
        .exd {
            position: relative;
            display: inline-block;
        }
        .exd .dd {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 200px;
            z-index: 200;
            flex-direction: column;
            box-shadow: 0 12px 32px rgba(0, 0, 0, .6);
        }
        .exd .dd.open {
            display: flex;
        }
        .exd .dd button {
            background: 0;
            border: none;
            color: var(--fg);
            padding: 8px 16px;
            font: 500 12px/1 'Space Grotesk', sans-serif;
            text-align: left;
            cursor: pointer;
            transition: background .12s;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .exd .dd button:hover {
            background: var(--bd);
        }
        .exd .dd button i {
            width: 18px;
            text-align: center;
            color: var(--mt);
            font-size: 14px;
        }
        .exd .dd .sep {
            height: 1px;
            background: var(--bd);
            margin: 4px 12px;
        }
        .exd .bt {
            padding: 6px 14px;
            gap: 6px;
        }
        .exd .bt i.fa-caret-down {
            font-size: 10px;
            margin-left: 2px;
            opacity: .6;
            transition: transform .2s;
        }
        .exd.open .bt i.fa-caret-down {
            transform: rotate(180deg);
        }
        .sb {
            background: var(--sf);
            border-right: 1px solid var(--bd);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 13px;
            scroll-behavior: smooth;
            height: 100%;
        }
        .stt {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--mt);
            margin-top: 8px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stt:first-child {
            margin-top: 0;
        }
        .cs {
            display: flex;
            gap: 4px;
            margin-bottom: 2px;
        }
        .cb {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 6px 4px 4px;
            border: 2px solid var(--bd);
            border-radius: 5px;
            background: var(--cd);
            color: var(--mt);
            font: 600 11px/1 'Space Grotesk', sans-serif;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
            position: relative;
            flex: 1;
            min-height: 44px;
        }
        .cb:hover {
            border-color: var(--fg);
            color: var(--fg);
            transform: translateY(-1px);
        }
        .cb.a {
            border-color: var(--in);
            color: var(--in);
            background: rgba(41, 182, 246, .12);
            box-shadow: 0 0 12px rgba(41, 182, 246, .15);
        }
        .cb .cb-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, .15);
            flex-shrink: 0;
        }
        .cb .cb-label {
            font-size: 9px;
            line-height: 1.2;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .db {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            background: var(--cd);
            border: 1px solid var(--bd);
            color: var(--fg);
            cursor: pointer;
            transition: all .12s;
            font: 500 12px/1.3 'Space Grotesk', sans-serif;
            text-align: left;
            width: 100%;
        }
        .db:hover {
            border-color: var(--ac);
            transform: translateX(2px);
        }
        .db.a {
            border-color: var(--ac);
            background: var(--ad);
        }
        .db .iw {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }
        .db .ds {
            font-size: 10px;
            color: var(--mt);
            font-weight: 400;
        }
        .dl,
        .cl {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background .12s;
            font-size: 12px;
        }
        .li:hover {
            background: var(--cd);
        }
        .li.s {
            background: var(--ad);
            border-left: 3px solid var(--ac);
        }
        .li .md {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .li .nm {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .li .mt {
            font: 500 11px/1 'JetBrains Mono', monospace;
            color: var(--mt);
        }
        .li .note-icon {
            font-size: 10px;
            color: var(--wn);
            margin-left: 4px;
        }
        .port-grid {
            padding: 4px 0 6px 18px;
            display: grid;
            grid-template-columns: repeat(8, 26px);
            gap: 3px;
        }
        .port-box {
            width: 26px;
            height: 26px;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: transform .1s, box-shadow .15s;
            user-select: none;
            flex-shrink: 0;
        }
        .port-box:hover {
            transform: scale(1.2);
            z-index: 5;
            box-shadow: 0 0 12px rgba(255, 255, 255, .25);
        }
        .port-box .type-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, .4);
        }
        .port-box .pnum {
            font-size: 9px;
            line-height: 1;
            text-shadow: 0 0 2px rgba(0, 0, 0, .8);
        }
        .port-box:nth-child(8n) {
            margin-right: 6px;
        }
        .port-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0 2px 18px;
            font-size: 9px;
            color: var(--mt);
            align-items: center;
        }
        .port-legend .leg-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .port-legend .leg-sq {
            width: 11px;
            height: 11px;
            border-radius: 2px;
            border: 1px solid var(--bd);
        }
        .ca {
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        canvas#dc {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ch {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 16px;
            padding: 7px 18px;
            font-size: 12px;
            color: var(--mt);
            pointer-events: none;
            white-space: nowrap;
        }
        .ch kbd {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 3px;
            padding: 1px 6px;
            font: 500 11px/1.4 'JetBrains Mono', monospace;
            color: var(--fg);
        }
        .zc {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .zb {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 1px solid var(--bd);
            background: var(--cd);
            color: var(--fg);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .12s;
        }
        .zb:hover {
            border-color: var(--ac);
            color: var(--ac);
        }
        .zb:disabled {
            opacity: .3;
            cursor: not-allowed;
            border-color: var(--bd);
            color: var(--mt);
        }
        .zb:disabled:hover {
            border-color: var(--bd);
            color: var(--mt);
        }
        .uc {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .uc-clear {
            margin-top: 4px;
            border-color: var(--dn) !important;
            color: var(--dn) !important;
        }
        .uc-clear:hover {
            background: rgba(255,71,87,.12) !important;
            border-color: var(--dn) !important;
            color: var(--dn) !important;
        }
        .dp {
            background: var(--sf);
            border-left: 1px solid var(--bd);
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            position: relative;
            min-width: 340px;
            width: 340px;
            transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease, opacity 0.25s ease, border 0.3s ease;
        }
        .dp-auto-hide {
            min-width: 0 !important;
            width: 0 !important;
            padding: 0 !important;
            border-left: none !important;
            opacity: 0;
            pointer-events: none;
        }
        .dp-toggle {
            position: absolute;
            left: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 48px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-right: none;
            border-radius: 6px 0 0 6px;
            color: var(--mt);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 10;
            pointer-events: auto;
        }
        .dp-toggle:hover {
            background: var(--bd);
            color: var(--fg);
        }
        .dp-auto-hide .dp-toggle {
            left: 0;
            border-radius: 0 6px 6px 0;
            border-right: 1px solid var(--bd);
            border-left: none;
        }
        .de {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: var(--mt);
            text-align: center;
        }
        .de i {
            font-size: 40px;
            opacity: .2;
        }
        .de p {
            font-size: 13px;
            line-height: 1.6;
        }
        .dh {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .di {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .dht h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .dht span {
            font-size: 11px;
            color: var(--mt);
        }
        .se {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .stl {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--mt);
            margin-bottom: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .stl .toggle-icon {
            font-size: 12px;
            transition: transform 0.2s;
            color: var(--mt);
        }
        .stl .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
        .se-collapsible .se-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.25s ease;
            max-height: 0;
            opacity: 0;
        }
        .se-collapsible.open .se-body {
            max-height: 2000px;
            opacity: 1;
        }
        .dr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            gap: 8px;
        }
        .dr:not(:last-child) {
            border-bottom: 1px solid rgba(42, 51, 72, .5);
        }
        .dr .l {
            color: var(--mt);
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 12px;
        }
        .dr .v {
            font: 500 12px/1 'JetBrains Mono', monospace;
            text-align: right;
        }
        .pb {
            flex: 1;
            max-width: 90px;
            height: 4px;
            background: var(--bd);
            border-radius: 2px;
            overflow: hidden;
        }
        .pb .f {
            height: 100%;
            border-radius: 2px;
            transition: width .3s;
        }
        .ei {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 5px;
            padding: 6px 9px;
            color: var(--fg);
            font: 500 13px/1.4 'JetBrains Mono', monospace;
            width: 100%;
            outline: 0;
            transition: border-color .15s;
        }
        .ei:focus {
            border-color: var(--ac);
        }
        .eis {
            width: 140px;
            flex-shrink: 0;
        }
        .es {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 5px;
            padding: 6px 8px;
            color: var(--fg);
            font: 500 12px/1.4 'Space Grotesk', sans-serif;
            outline: 0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .es:focus {
            border-color: var(--ac);
        }
        .es option {
            background: var(--cd);
            color: var(--fg);
        }
        .tc {
            position: fixed;
            top: 70px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .tt {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 7px;
            padding: 10px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: tI .25s ease, tO .25s ease 2.2s forwards;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
        }
        .tt.ok {
            border-left: 3px solid var(--ac);
        }
        .tt.er {
            border-left: 3px solid var(--dn);
        }
        .tt.in {
            border-left: 3px solid var(--in);
        }
        @keyframes tI {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes tO {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: 0;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bd);
            border-radius: 3px;
        }
        #fileInput {
            display: none;
        }
        .port-type-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(42, 51, 72, .3);
        }
        .port-type-row .pt-label {
            min-width: 40px;
            color: var(--mt);
            font-weight: 600;
        }
        .port-type-row .pt-select {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 3px 6px;
            color: var(--fg);
            font: 500 11px/1.4 'Space Grotesk', sans-serif;
            outline: 0;
            cursor: pointer;
            flex: 1;
            max-width: 100px;
            transition: opacity .2s;
        }
        .port-type-row .pt-select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: var(--bd);
        }
        .port-type-row .pt-select:focus:not(:disabled) {
            border-color: var(--ac);
        }
        .port-type-row .pt-vlan {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 3px 6px;
            color: var(--fg);
            font: 500 11px/1.4 'JetBrains Mono', monospace;
            outline: 0;
            width: 56px;
            transition: border-color .15s;
            flex-shrink: 0;
        }
        .port-type-row .pt-vlan:focus {
            border-color: var(--ac);
        }
        .port-type-row .pt-vlan:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: var(--bd);
        }
        .port-type-row .pt-status {
            font-size: 10px;
            color: var(--mt);
            margin-left: auto;
            flex-shrink: 0;
        }
        .port-type-row .pt-status.used {
            color: var(--ac);
        }
        .snap-btn-active {
            border-color: var(--yl) !important;
            color: var(--yl) !important;
            background: rgba(250, 204, 21, 0.15) !important;
        }
        .snap-btn-active:hover {
            background: rgba(250, 204, 21, 0.25) !important;
        }
        .snap-btn-inactive {
            border-color: var(--bd) !important;
            color: var(--mt) !important;
        }
        .sb-notes {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 6px;
        }
        .sb-notes.visible {
            display: block;
        }
        .sb-notes label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--mt);
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }
        .sb-notes textarea {
            width: 100%;
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--fg);
            font-size: 12px;
            font-family: 'Space Grotesk', sans-serif;
            resize: vertical;
            min-height: 50px;
            outline: none;
        }
        .sb-notes textarea:focus {
            border-color: var(--ac);
        }
        .sb-notes .note-empty {
            font-size: 11px;
            color: var(--mt);
            font-style: italic;
            padding: 4px 0;
        }
        .profile-item {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 5px;
            padding: 8px 10px;
            margin-bottom: 4px;
        }
        .profile-item .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--mt);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-item .profile-header .del-prof {
            color: var(--dn);
            cursor: pointer;
            font-size: 11px;
            padding: 0 4px;
        }
        .profile-item .profile-header .del-prof:hover {
            opacity: .7;
        }
        .profile-item .ei-sm {
            font-size: 11px;
            padding: 4px 6px;
            width: 100%;
        }
        .profile-item .ei-sm-pw {
            font-size: 11px;
            padding: 4px 6px;
            width: calc(100% - 28px);
        }
        .profile-item .pw-toggle {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 4px;
            color: var(--mt);
            padding: 3px 6px;
            cursor: pointer;
            font-size: 11px;
        }
        .profile-item .pw-toggle:hover {
            color: var(--fg);
        }
        .add-prof {
            background: var(--cd);
            border: 1px dashed var(--bd);
            border-radius: 5px;
            padding: 6px;
            text-align: center;
            color: var(--mt);
            font-size: 11px;
            cursor: pointer;
            transition: all .15s;
            width: 100%;
        }
        .add-prof:hover {
            border-color: var(--ac);
            color: var(--ac);
        }
        .dp-connected-info {
            font-size: 11px;
            color: var(--mt);
            padding: 2px 0;
        }
        .dp-connected-info .ci-label {
            color: var(--mt);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dp-connected-info .ci-value {
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        .dp-connected-info .ci-value.accent {
            color: var(--ac);
        }
        .dp-connected-info .ci-value.warn {
            color: var(--wn);
        }
        .dp-connected-info .ci-value.danger {
            color: var(--dn);
        }
        /* Untuk connected cables multi-baris */
        .conn-cable-item {
            cursor: pointer;
            padding: 5px 0;
            border-bottom: 1px solid rgba(42, 51, 72, .3);
        }
        .conn-cable-item .conn-main {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--fg);
        }
        .conn-cable-item .conn-main .conn-dot {
            display: inline-block;
            width: 12px;
            height: 2px;
            border-radius: 1px;
            flex-shrink: 0;
        }
        .conn-cable-item .conn-main .conn-name {
            flex: 1;
        }
        .conn-cable-item .conn-main .conn-bw {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--mt);
        }
        .conn-cable-item .conn-detail {
            font-size: 10px;
            color: var(--mt);
            padding-left: 20px;
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
        }
        .conn-cable-item .conn-detail .detail-item {
            display: inline-block;
            margin-right: 12px;
        }
        .conn-cable-item .conn-detail .detail-item .dl-label {
            color: var(--mt);
            font-weight: 600;
        }
        .conn-cable-item .conn-detail .detail-item .dl-value {
            color: var(--fg);
        }

                if (cabs[i].from === devId || cabs[i].to === devId) r.push(cabs[i]);

        }

        function getSsidProfiles(devId) {

        }

        function getPppoeProfiles(devId) {
            var d = getDeviceById(devId);

        }

        function getVlanProfiles(devId) {
            var d = getDeviceById(devId);
            if (!d) return [];
            return d.vlanProfiles || [];
        }

        function getPortTypeObj(dev, portNum) {
            if (!dev || !dev.portTypes) return null;
            var pt = dev.portTypes[portNum - 1];
            if (typeof pt === 'string') return { type: pt, vlan: '' };
            if (pt && typeof pt === 'object') return pt;
            return null;
        }

        function getPortType(dev, portNum) {
            var o = getPortTypeObj(dev, portNum);
            return o ? o.type : null;
        }

        function getPortVlan(dev, portNum) {
            var o = getPortTypeObj(dev, portNum);
            return o ? (o.vlan || '') : '';
        }

        function mkD(t, x, y) {
            var d = DT[t];
            idC++;
            var portTypes = [];
            for (var p = 1; p <= d.pt; p++) portTypes.push(null);
            return {
                id: idC,
                type: t,
                x: x,
                y: y,
                status: DS_ARR[Math.floor(Math.random() * 3)],
                name: d.lb + '-' + String(idC).padStart(3, '0'),
                ip: '192.168.' + ((idC % 253) + 1) + '.' + (((idC * 7) % 253) + 1),

                mac: Array.from({ length: 6 }, function() { return Math.floor(Math.random() * 256).toString(16)
                        .padStart(2, '0'); }).join(':'),
                ports: d.pt,
                portTypes: portTypes,
                uptime: Math.floor(Math.random() * 720) + 'h ' + Math.floor(Math.random() * 60) + 'm',
                cpu: Math.floor(Math.random() * 80) + 5,
                mem: Math.floor(Math.random() * 70) + 10,
                temp: Math.floor(Math.random() * 40) + 25,

        }

        function setPortTypeVlan(devId, portNum, type, vlan) {
            var dev = getDeviceById(devId);
            if (!dev) return false;
            if (!dev.portTypes) { dev.portTypes = [];
                for (var p = 1; p <= dev.ports; p++) dev.portTypes.push(null); }
            if (portNum >= 1 && portNum <= dev.ports) {
                dev.portTypes[portNum - 1] = { type: type || null, vlan: vlan || '' };
                return true;
            }
            return false;
        }

        function usedPorts(devId, excCabId) {
            var u = {};
            for (var i = 0; i < cabs.length; i++) {
                var c = cabs[i];
                if (c.id === excCabId) continue;
                if (c.from === devId) u[c.fromPort] = 1;
                if (c.to === devId) u[c.toPort] = 1;
            }
            return u;
        }

        // Modified: nextFree now respects cable type and source/destination role
        function nextFree(devId, excCabId, cableType, isSource) {
            var d = getDeviceById(devId);
            if (!d) return -1;
            var u = usedPorts(devId, excCabId);
            var hasSsid = (d.ssidProfiles && d.ssidProfiles.length > 0);
        
            for (var p = 1; p <= d.ports; p++) {
                var ptObj = getPortTypeObj(d, p);
                var pt = ptObj ? ptObj.type : null;
                if (cableType === 'wireless') {
                    // For wireless:
                    // Source: allow used port if device has SSID (AP mode)
                    // Destination: port must be unused
                    var isUsed = u[p] ? true : false;
                    if (pt === 'wireless' || pt === null) {
                        if (isSource) {
                            if (!isUsed || hasSsid) {
                                return p;
                            }
                        } else {
                            if (!isUsed) {
                                return p;
                            }
                        }
                    }
                } else {
                    // For other cable types: port must match type or be empty, and unused
                    if (u[p]) continue;
                    if (pt === cableType || pt === null) {
                        return p;
                    }
                }
            }
            return -1;
        }
        
        // Modified: mkC uses isSource parameter
        function mkC(f, t, tp) {
            var fp = nextFree(f, -1, tp, true);  // source
            var tp2 = nextFree(t, -1, tp, false); // destination
            if (fp === -1 || tp2 === -1) {
                var msg = 'No suitable ' + (tp === 'wireless' ? 'wireless/empty' : tp) + ' port available on one of the devices';
                toast(msg, 'er');
                return null;
            }
            cidC++;
            var a = getDeviceById(f),
                b = getDeviceById(t);
            var dx = a.x - b.x,
                dy = a.y - b.y,
                pts = [];
            for (var i = 0, n = 3 + Math.floor(Math.random() * 3); i < n; i++) pts.push({ t: Math.random(), sp: .2 + Math.random() * .3 });
            return {
                id: cidC,
                from: f,
                to: t,
                type: tp,
                fromPort: fp,
                toPort: tp2,
                status: CS_ARR[Math.floor(Math.random() * 3)],
                bw: Math.floor(Math.random() * 900) + 100,
                mx: 1000,
                lat: Math.floor(Math.random() * 50) + 1,
                len: Math.round(Math.hypot(dx, dy)),
                pts: pts,
                name: 'Cable-' + String(cidC).padStart(3, '0'),
                ssid: '',
                pppoe: '',
                vlanSource: '',
                vlanDest: ''
            };
        }

        function hD(x, y) {
            for (var i = devs.length - 1; i >= 0; i--) {
                var d = devs[i],
                    r = DT[d.type].r + 6,
                    dx = x - d.x,
                    dy = y - d.y;
                if (dx * dx + dy * dy <= r * r) return d;
            }
            return null;
        }

        function hC(x, y) {
            var best = null,
                bestD = 18;
            for (var i = 0; i < cabs.length; i++) {
                var c = cabs[i],
                    a = getDeviceById(c.from),
                    b = getDeviceById(c.to);
                if (!a || !b) continue;
                var ds = ptSegDist(x, y, a.x, a.y, b.x, b.y);
                if (ds < bestD) { bestD = ds;
                    best = c; }
            }
            return best;
        }

        function ptSegDist(px, py, ax, ay, bx, by) {
            var dx = bx - ax,
                dy = by - ay,
                l = dx * dx + dy * dy;
            if (l === 0) return Math.hypot(px - ax, py - ay);
            var t = ((px - ax) * dx + (py - ay) * dy) / l;
            if (t < 0) t = 0;
            if (t > 1) t = 1;
            return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
        }

        function toast(msg, type) {

            var col = type === 'ok' ? 'var(--ac)' : type === 'er' ? 'var(--dn)' : 'var(--in)';
            d.innerHTML = '<i class="fa-solid ' + icon + '" style="color:' + col + '"></i> ' + msg;
            c.appendChild(d);
            setTimeout(function() { if (d.parentNode) d.remove(); }, 3000);
        }

        function uSt() {
            var on = 0,
                wa = 0,
                of = 0;

                else if (devs[i].status === 'warning') wa++;

            }
            document.getElementById('sO').textContent = on;
            document.getElementById('sW').textContent = wa;
            document.getElementById('sF').textContent = of;
            document.getElementById('sC').textContent = cabs.length;

        // ========== RENDER ==========
        function ren() {
            cx.setTransform(dp, 0, 0, dp, 0, 0);
            cx.clearRect(0, 0, cW, cH);
            drawGrid();
            cx.save();
            cx.translate(pX, pY);
            cx.scale(zm, zm);
            drawCables();
            drawDevices();
            drawConnPreview();
            drawSelectionBox();
            cx.restore();
            drawGhost();
        }

        function drawGrid() {
            var g = 40 * zm;
            if (g < 8) return;
            var ox = pX % g,
                oy = pY % g;
            cx.strokeStyle = 'rgba(42,51,72,.3)';
            cx.lineWidth = .5;
            cx.beginPath();
            for (var x = ox; x < cW; x += g) { cx.moveTo(x, 0);
                cx.lineTo(x, cH); }
            for (var y = oy; y < cH; y += g) { cx.moveTo(0, y);
                cx.lineTo(cW, y); }
            cx.stroke();
            var o = w2s(0, 0);
            if (o.x > -20 && o.x < cW + 20 && o.y > -20 && o.y < cH + 20) {
                cx.strokeStyle = 'rgba(0,212,142,.06)';
                cx.lineWidth = 1;
                cx.beginPath();
                cx.moveTo(o.x, 0);
                cx.lineTo(o.x, cH);
                cx.moveTo(0, o.y);
                cx.lineTo(cW, o.y);
                cx.stroke();
            }
            if (snapToGrid) {
                var gs = GRID_SIZE * zm;
                if (gs > 4 && gs < 200) {
                    var topLeft = s2w(0, 0);
                    var bottomRight = s2w(cW, cH);
                    var startX = Math.floor(topLeft.x / GRID_SIZE) * GRID_SIZE;
                    var startY = Math.floor(topLeft.y / GRID_SIZE) * GRID_SIZE;
                    var endX = Math.ceil(bottomRight.x / GRID_SIZE) * GRID_SIZE;
                    var endY = Math.ceil(bottomRight.y / GRID_SIZE) * GRID_SIZE;
                    var maxLines = 80;
                    var stepX = Math.max(1, Math.ceil((endX - startX) / GRID_SIZE / maxLines));
                    var stepY = Math.max(1, Math.ceil((endY - startY) / GRID_SIZE / maxLines));
                    cx.strokeStyle = 'rgba(250,204,21,.08)';
                    cx.lineWidth = .5;
                    cx.setLineDash([2, 4]);
                    cx.beginPath();
                    for (var x = startX; x <= endX; x += GRID_SIZE * stepX) {
                        var sx = x * zm + pX;
                        if (sx >= 0 && sx <= cW) { cx.moveTo(sx, 0);
                            cx.lineTo(sx, cH); }
                    }
                    for (var y = startY; y <= endY; y += GRID_SIZE * stepY) {
                        var sy = y * zm + pY;
                        if (sy >= 0 && sy <= cH) { cx.moveTo(0, sy);
                            cx.lineTo(cW, sy); }
                    }
                    cx.stroke();
                    cx.setLineDash([]);
                }
            }
        }

        function drawCables() {
            for (var i = 0; i < cabs.length; i++) {
                var c = cabs[i],
                    a = getDeviceById(c.from),
                    b = getDeviceById(c.to);
                if (!a || !b) continue;
                var ct = CT[c.type],
                    isSel = (c.id === sCI);

                var isExport = __exportMode;
                var theme = __exportTheme || 'dark';
                var labelBg, labelStroke, labelTextColor;
                if (isExport) {
                    if (theme === 'dark') {
                        labelBg = 'rgba(12,15,20,.9)';
                        labelStroke = 'rgba(42,51,72,.5)';
                        labelTextColor = c.status === 'degraded' ? '#ffa726' : c.status === 'down' ? '#ff4757' :
                        '#7b8ca3';
                    } else {
                        labelBg = 'rgba(255,255,255,0.85)';
                        labelStroke = 'rgba(42,51,72,0.3)';
                        labelTextColor = c.status === 'degraded' ? '#ffa726' : c.status === 'down' ? '#ff4757' :
                            '#444444';
                    }
                } else {
                    labelBg = 'rgba(12,15,20,.9)';
                    labelStroke = 'rgba(42,51,72,.5)';
                    labelTextColor = c.status === 'degraded' ? '#ffa726' : c.status === 'down' ? '#ff4757' : '#7b8ca3';
                }

                if (isSel) {
                    cx.strokeStyle = ct.co;
                    cx.lineWidth = ct.w + 6;
                    cx.globalAlpha = .12;
                    cx.setLineDash([]);
                    cx.beginPath();
                    cx.moveTo(a.x, a.y);
                    cx.lineTo(b.x, b.y);
                    cx.stroke();
                    cx.globalAlpha = 1;
                }
                cx.strokeStyle = c.status === 'down' ? 'rgba(255,71,87,.25)' : ct.co;
                cx.lineWidth = ct.w;
                cx.setLineDash(ct.dh);
                cx.globalAlpha = c.status === 'down' ? .25 : (isSel ? 1 : .55);
                cx.beginPath();
                cx.moveTo(a.x, a.y);
                cx.lineTo(b.x, b.y);
                cx.stroke();
                cx.setLineDash([]);
                cx.globalAlpha = 1;
                if (c.status !== 'down') {
                    for (var p = 0; p < c.pts.length; p++) {
                        var pt = c.pts[p],
                            px = a.x + (b.x - a.x) * pt.t,
                            py = a.y + (b.y - a.y) * pt.t,
                            pr = Math.max(1.5, 3 * (c.type === 'fiber' ? 1.3 : 1));
                        cx.beginPath();
                        cx.arc(px, py, pr, 0, 6.2832);
                        cx.fillStyle = ct.co;
                        cx.globalAlpha = .85;
                        cx.fill();
                        cx.beginPath();
                        cx.arc(px, py, pr + 3, 0, 6.2832);
                        cx.fillStyle = ct.co;
                        cx.globalAlpha = .15;
                        cx.fill();
                        cx.globalAlpha = 1;
                    }
                }
                var mx = (a.x + b.x) / 2,
                    my = (a.y + b.y) / 2,
                    lb = (c.name || 'Cable') + ' P' + c.fromPort + '\u2192P' + c.toPort + ' ' + c.bw + 'M';
                cx.font = '600 8px "JetBrains Mono",monospace';
                cx.textAlign = 'center';
                cx.textBaseline = 'middle';
                var tw = cx.measureText(lb).width + 10;
                cx.fillStyle = labelBg;
                cx.beginPath();
                cx.roundRect(mx - tw / 2, my - 7, tw, 14, 3);
                cx.fill();
                cx.strokeStyle = labelStroke;
                cx.lineWidth = .5;
                cx.stroke();
                cx.fillStyle = labelTextColor;
                cx.fillText(lb, mx, my);
            }
        }

        function drawDevices() {
            for (var i = 0; i < devs.length; i++) {
                var d = devs[i],
                    t = DT[d.type],
                    r = t.r,
                    isSel = (d.id === sDI),
                    isCS = (d.id === cSrc),
                    isMultiSel = (selectedDevs.indexOf(d.id) !== -1),
                    s = d.sc;
                if (s < .01) continue;
                cx.save();
                cx.translate(d.x, d.y);
                cx.scale(s, s);

                var isExport = __exportMode;
                var theme = __exportTheme || 'dark';
                var nameColor, ipColor, deviceBg, deviceStroke, strokeColor;

                if (isExport) {
                    if (theme === 'dark') {
                        nameColor = '#e4eaf2';
                        ipColor = '#7b8ca3';
                        deviceBg = '#1c2230';
                        deviceStroke = 'rgba(42,51,72,0.7)';
                    } else {
                        nameColor = '#1a1f2e';
                        ipColor = '#444444';
                        deviceBg = '#f5f5f5';
                        deviceStroke = 'rgba(42,51,72,0.5)';
                    }
                    strokeColor = 'rgba(42,51,72,0.5)';
                } else {
                    nameColor = '#e4eaf2';
                    ipColor = '#7b8ca3';
                    deviceBg = '#1c2230';
                    deviceStroke = 'rgba(42,51,72,0.7)';
                    strokeColor = (isSel || isMultiSel) ? '#29b6f6' : 'rgba(42,51,72,0.7)';
                }

                if (d.status === 'online') {
                    var pulse = Math.sin(d.ph) * .5 + .5;
                    cx.beginPath();
                    cx.arc(0, 0, r + 6 + pulse * 12, 0, 6.2832);
                    cx.strokeStyle = 'rgba(' + hR(t.co) + ',' + (0.04 + pulse * .04) + ')';
                    cx.lineWidth = 1.2;
                    cx.stroke();
                }
                if (isCS) {
                    cx.beginPath();
                    cx.arc(0, 0, r + 8, 0, 6.2832);
                    cx.strokeStyle = '#29b6f6';
                    cx.lineWidth = 2;
                    cx.setLineDash([5, 5]);
                    cx.lineDashOffset = -tm * 28;
                    cx.stroke();
                    cx.setLineDash([]);
                    cx.lineDashOffset = 0;
                }
                if (isSel || isMultiSel) {
                    cx.beginPath();
                    cx.arc(0, 0, r + 5, 0, 6.2832);
                    cx.strokeStyle = isSel ? '#fff' : '#29b6f6';
                    cx.lineWidth = isSel ? 3 : 2;
                    cx.setLineDash(isSel ? [4, 4] : [3, 3]);
                    cx.stroke();
                    cx.setLineDash([]);
                }
                cx.shadowColor = 'rgba(0,0,0,.35)';
                cx.shadowBlur = 12;
                cx.shadowOffsetY = 3;
                cx.beginPath();
                cx.arc(0, 0, r, 0, 6.2832);
                cx.fillStyle = deviceBg;
                cx.fill();
                cx.shadowColor = 'transparent';
                cx.beginPath();
                cx.arc(0, 0, r, 0, 6.2832);
                cx.strokeStyle = (isSel || isMultiSel) ? '#29b6f6' : deviceStroke;
                cx.lineWidth = (isSel || isMultiSel) ? 2.5 : 1.2;
                cx.stroke();
                cx.fillStyle = t.co;
                cx.textAlign = 'center';
                cx.textBaseline = 'middle';
                cx.font = '900 ' + Math.round(r * .6) + 'px "Font Awesome 6 Free"';
                cx.fillText(t.ic, 0, 1);
                var scolor = SC_OBJ[d.status],
                    dx2 = r * .5,
                    dy2 = -r * .5;
                cx.beginPath();
                cx.arc(dx2, dy2, 4, 0, 6.2832);
                cx.fillStyle = scolor;
                cx.fill();
                cx.beginPath();
                cx.arc(dx2, dy2, 4, 0, 6.2832);
                cx.strokeStyle = deviceBg;
                cx.lineWidth = 2;
                cx.stroke();
                cx.beginPath();
                cx.arc(-r * .5, r * .5, 7, 0, 6.2832);
                cx.fillStyle = 'rgba(250,204,21,.85)';
                cx.fill();
                cx.font = '700 7px "JetBrains Mono",monospace';
                cx.fillStyle = '#1a1f2e';
                cx.fillText(String(d.ports), -r * .5, r * .5 + .5);
                var cc = 0;
                for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) cc++; }
                if (cc > 0) {
                    cx.beginPath();
                    cx.arc(r * .5, r * .5, 7, 0, 6.2832);
                    cx.fillStyle = 'rgba(41,182,246,.85)';
                    cx.fill();
                    cx.font = '700 7px "JetBrains Mono",monospace';
                    cx.fillStyle = '#fff';
                    cx.fillText(String(cc), r * .5, r * .5 + .5);
                }
                cx.font = '700 10px "Space Grotesk",sans-serif';
                cx.textAlign = 'center';
                cx.textBaseline = 'top';
                cx.fillStyle = nameColor;
                cx.fillText(d.name, 0, r + 7);
                cx.font = '500 8px "JetBrains Mono",monospace';
                cx.fillStyle = ipColor;
                cx.fillText(d.ip, 0, r + 19);
                cx.restore();
            }
        }

        function drawSelectionBox() {
            if (!selBox || !isSelBox) return;
            var x1 = Math.min(selBox.x1, selBox.x2),
                y1 = Math.min(selBox.y1, selBox.y2);
            var x2 = Math.max(selBox.x1, selBox.x2),
                y2 = Math.max(selBox.y1, selBox.y2);
            cx.save();
            cx.strokeStyle = 'rgba(41,182,246,.6)';
            cx.lineWidth = 1.5;
            cx.setLineDash([4, 4]);
            cx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            cx.fillStyle = 'rgba(41,182,246,.06)';
            cx.fillRect(x1, y1, x2 - x1, y2 - y1);
            cx.restore();
        }

        function drawConnPreview() {
            if (mode !== 'connect' || cSrc === null) return;
            var src = getDeviceById(cSrc);
            if (!src) return;
            var w = s2w(mX, mY),
                ct = CT[selCT];
            cx.strokeStyle = ct.co;
            cx.lineWidth = ct.w;
            cx.globalAlpha = .4;
            cx.setLineDash([6, 4]);
            cx.lineDashOffset = -tm * 18;
            cx.beginPath();
            cx.moveTo(src.x, src.y);
            cx.lineTo(w.x, w.y);
            cx.stroke();
            cx.setLineDash([]);
            cx.lineDashOffset = 0;
            cx.globalAlpha = 1;
        }

        function drawGhost() {
            if (mode !== 'place' || dragD || iPan) return;
            if (mX < 0 || mX > cW || mY < 0 || mY > cH) return;
            var t = DT[selT],
                r = t.r;
            cx.save();
            cx.globalAlpha = .2;
            cx.beginPath();
            cx.arc(mX, mY, r * zm, 0, 6.2832);
            cx.fillStyle = t.bg;
            cx.fill();
            cx.strokeStyle = t.co;
            cx.lineWidth = 1;
            cx.setLineDash([3, 3]);
            cx.stroke();
            cx.setLineDash([]);
            cx.font = '900 ' + Math.round(r * .6 * zm) + 'px "Font Awesome 6 Free"';
            cx.textAlign = 'center';
            cx.textBaseline = 'middle';
            cx.fillStyle = t.co;
            cx.fillText(t.ic, mX, mY + 1);
            cx.restore();
        }

        // ========== ANIMATION LOOP ==========
        var lT = 0;

        function loop(ts) {
            var dt = Math.min((ts - lT) / 1000, .05);
            lT = ts;
            tm += dt;
            var dirty = false;
            for (var i = 0; i < devs.length; i++) {
                var d = devs[i];
                if (Math.abs(d.sc - d.ts) > .001) { d.sc += (d.ts - d.sc) * Math.min(1, dt * 12);
                    dirty = true; }
                d.ph += dt * 2.5;
                dirty = true;
            }
            for (var i = 0; i < cabs.length; i++) {
                var c = cabs[i],
                    ct = CT[c.type];
                for (var p = 0; p < c.pts.length; p++) {
                    c.pts[p].t += dt * c.pts[p].sp * ct.sp * .5;
                    if (c.pts[p].t > 1) c.pts[p].t -= 1;
                }
                dirty = true;
            }
            var r = cv.parentElement.getBoundingClientRect();
            if (Math.abs(r.width - cW) > 0.5 || Math.abs(r.height - cH) > 0.5) {
                dp = window.devicePixelRatio || 1;
                cv.width = r.width * dp;
                cv.height = r.height * dp;
                cv.style.width = r.width + 'px';
                cv.style.height = r.height + 'px';
                cW = r.width;
                cH = r.height;
                dirty = true;
            }
            if (dirty) ren();
            requestAnimationFrame(loop);
        }

        // ========== DROPDOWN ==========
        var ddTimer = null;

        function openDropdown() {
            var dd = document.getElementById('dropdownMenu'),
                exd = document.getElementById('exportDropdown');

        // ========== uDL ==========
        function uDL() {
            var el = document.getElementById('dL');
            if (!el) return;
            if (!devs.length) {
                el.innerHTML = '<div style="font-size:12px;color:var(--mt);padding:6px;text-align:center">Empty</div>';
                return;
            }
            var h = '';
            for (var i = 0; i < devs.length; i++) {
                var d = devs[i];
                var cc = 0;
                for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) cc++; }
                var used = usedPorts(d.id, -1);
                var portGrid = '';
                var portTypes = d.portTypes || [];
                for (var p = 1; p <= d.ports; p++) {
                    var isUsed = used[p] ? true : false;
                    var cable = getCableOnPort(d.id, p);
                    var cableType = cable ? cable.type : null;
                    var cableStatus = cable ? cable.status : null;
                    var destName = '';
                    if (cable) {
                        var otherId = (cable.from === d.id) ? cable.to : cable.from;
                        var other = getDeviceById(otherId);
                        if (other) destName = other.name;
                    }
                    var ptObj = getPortTypeObj(d, p);
                    var pt = ptObj ? ptObj.type : null;
                    var vlan = ptObj ? ptObj.vlan : '';
                    var displayType = cableType || pt;
                    var bgColor, borderColor, textColor;
                    if (!isUsed && !displayType) {
                        bgColor = 'var(--cd)';
                        borderColor = 'var(--bd)';
                        textColor = 'var(--mt)';
                    } else if (isUsed) {
                        if (cableStatus === 'active') { bgColor = 'var(--ac)';
                            borderColor = 'var(--ac)';
                            textColor = '#fff'; } else if (cableStatus === 'degraded') { bgColor = 'var(--wn)';
                            borderColor = 'var(--wn)';
                            textColor = '#1a1f2e'; } else { bgColor = 'var(--dn)';
                            borderColor = 'var(--dn)';
                            textColor = '#fff'; }
                    } else {
                        var ptCol = PORT_COLORS[displayType] || 'var(--mt)';
                        bgColor = 'rgba(255,255,255,.08)';
                        borderColor = ptCol;
                        textColor = ptCol;
                    }
                    var typeDotColor = '';
                    if (displayType) typeDotColor = PORT_COLORS[displayType] || '';
                    var title = 'Port ' + p;
                    if (isUsed) {
                        title += ' → ' + destName + ' (' + (cableType ? CT[cableType].lb : '?') + ', ' + cableStatus +
                            ')';
                    } else if (displayType) {
                        title += ' (' + displayType + (vlan ? ', VLAN ' + vlan : '') + ', empty)';
                    } else {
                        title += ' (empty)';
                    }
                    portGrid += '<div class="port-box" style="background:' + bgColor + ';border:1px solid ' +
                        borderColor + ';color:' + textColor + ';" title="' + title + '" data-dev="' + d.id +
                        '" data-port="' + p + '">' +
                        '<span class="pnum">' + p + '</span>' +
                        (displayType ? '<span class="type-dot" style="background:' + typeDotColor + ';"></span>' :
                            '') +
                        '</div>';
                }
                var legend = '';
                if (d.ports > 0) {
                    legend = '<div class="port-legend">' +
                        '<span class="leg-item"><span class="leg-sq" style="background:var(--ac);"></span> Active</span>' +
                        '<span class="leg-item"><span class="leg-sq" style="background:var(--wn);"></span> Degraded</span>' +
                        '<span class="leg-item"><span class="leg-sq" style="background:var(--dn);"></span> Down</span>' +
                        '<span class="leg-item"><span class="leg-sq" style="background:var(--cd);border-color:var(--bd);"></span> Empty</span>' +
                        '<span class="leg-item" style="margin-left:4px;color:var(--mt);font-size:8px;">● ' +
                        '<span style="color:var(--in);">E</span> <span style="color:var(--pp);">F</span> <span style="color:var(--wn);">W</span> <span style="color:#888;">O</span></span>' +
                        '</div>';
                }
                var isMultiSel = (selectedDevs.indexOf(d.id) !== -1);
                var isActive = (d.id === sDI || isMultiSel);
                var hasNote = d.notes && d.notes.trim().length > 0;
                var opMode = d.operationMode ? ' [' + d.operationMode + ']' : '';
                h += '<div class="li' + (isActive ? ' s' : '') + '" data-d="' + d.id + '" id="dev-' + d.id + '">' +
                    '<span class="md" style="background:' + SC_OBJ[d.status] + '"></span>' +
                    '<span class="nm">' + d.name + (isMultiSel ? ' ✦' : '') + (hasNote ?
                        ' <i class="fa-regular fa-note-sticky note-icon"></i>' : '') + opMode + '</span>' +
                    '<span class="mt">' + d.ports + 'P ' + cc +
                    '<i class="fa-solid fa-link" style="font-size:9px;margin-left:2px"></i></span>' +
                    '</div>' +
                    '<div class="port-grid">' + portGrid + '</div>' +
                    legend;
            }
            el.innerHTML = h;

            var pboxes = el.querySelectorAll('.port-box');
            for (var i = 0; i < pboxes.length; i++) {
                pboxes[i].addEventListener('click', function(e) {
                    e.stopPropagation();
                    var devId = +this.dataset.dev;
                    var portNum = +this.dataset.port;
                    var d = getDeviceById(devId);
                    if (!d) return;
                    var info = 'Port ' + portNum + ' on ' + d.name;
                    var cable = getCableOnPort(devId, portNum);
                    if (cable) {
                        var otherId = (cable.from === devId) ? cable.to : cable.from;
                        var other = getDeviceById(otherId);
                        info += ' → ' + (other ? other.name : '?') + ' (' + CT[cable.type].lb + ', ' + cable
                            .status + ', ' + cable.bw + 'Mbps)';
                    } else {
                        var pt = getPortType(d, portNum);
                        var v = getPortVlan(d, portNum);
                        info += ' (empty' + (pt ? ', type: ' + pt : '') + (v ? ', VLAN: ' + v : '') + ')';
                    }
                    toast(info, 'in');
                    sDI = devId;
                    sCI = null;
                    var t = w2s(d.x, d.y);
                    pX += cW / 2 - t.x;
                    pY += cH / 2 - t.y;
                    skipAutoScroll = false;
                    uUI(true);
                    ren();
                });
            }
            var lis = el.querySelectorAll('.li');
            for (var i = 0; i < lis.length; i++) {
                lis[i].addEventListener('click', function() {
                    var id = +this.dataset.d;
                    var d = getDeviceById(id);
                    if (!d) return;
                    if (selectedDevs.indexOf(id) === -1) { selectedDevs = [id]; }
                    sDI = id;
                    sCI = null;
                    var t = w2s(d.x, d.y);
                    pX += cW / 2 - t.x;
                    pY += cH / 2 - t.y;
                    skipAutoScroll = false;
                    uUI(true);
                    ren();
                });
            }
            updateNotesSidebar();
        }

        // --- build device detail ---
        var _sDD = function(d) {

            var stO = '',

                tyO + '</select><select class="es" id="eS" style="font-size:12px">' + stO +

            // === LAN ===

        function exportPNG(mode) {
            if (!devs.length && !cabs.length) { toast('Nothing to export', 'er'); return; }

            var minX = Infinity,
                minY = Infinity,
                maxX = -Infinity,
                maxY = -Infinity;
            for (var i = 0; i < devs.length; i++) {
                var d = devs[i],
                    r = DT[d.type].r + 20;
                if (d.x - r < minX) minX = d.x - r;
                if (d.y - r < minY) minY = d.y - r;
                if (d.x + r > maxX) maxX = d.x + r;
                if (d.y + r > maxY) maxY = d.y + r;
                if (d.y + r + 30 > maxY) maxY = d.y + r + 30;
            }
            for (var i = 0; i < cabs.length; i++) {
                var c = cabs[i],
                    a = getDeviceById(c.from),
                    b = getDeviceById(c.to);
                if (a) { if (a.x < minX) minX = a.x;
                    if (a.y < minY) minY = a.y;
                    if (a.x > maxX) maxX = a.x;
                    if (a.y > maxY) maxY = a.y; }
                if (b) { if (b.x < minX) minX = b.x;
                    if (b.y < minY) minY = b.y;
                    if (b.x > maxX) maxX = b.x;
                    if (b.y > maxY) maxY = b.y; }
            }
            var padding = 80;
            minX -= padding;
            minY -= padding;
            maxX += padding;
            maxY += padding;
            var tw = maxX - minX,
                th = maxY - minY;
            var scale = 2;
            var w = Math.ceil(tw * scale),
                h = Math.ceil(th * scale);
            var off = document.createElement('canvas');
            off.width = w;
            off.height = h;
            var ox = off.getContext('2d');

            if (mode === 'light') {
                ox.fillStyle = '#ffffff';
                ox.fillRect(0, 0, w, h);
            } else {
                ox.clearRect(0, 0, w, h);

                svg += '  <circle cx="' + d.x + '" cy="' + d.y + '" r="' + r +

                var iconSize = r * 0.65;
                var iconSvg = drawDeviceSVGInline(d.type, d.x, d.y, iconSize, color);
                svg += '  ' + iconSvg + '\n';

                var scolor = SC_OBJ[d.status];
                var strokeDot = isDark ? deviceBg : '#ffffff';
                svg += '  <circle cx="' + (d.x + r * 0.5) + '" cy="' + (d.y - r * 0.5) + '" r="4" fill="' +

                svg += '  <circle cx="' + (d.x - r * 0.5) + '" cy="' + (d.y + r * 0.5) +

                svg += '  <text x="' + (d.x - r * 0.5) + '" y="' + (d.y + r * 0.5 + 0.5) +
                    '" text-anchor="middle" dominant-baseline="central" font-size="7" font-family="JetBrains Mono,monospace" font-weight="700" fill="#1a1f2e">' +
                    d.ports + '</text>\n';
                var cc = 0;
                for (var j = 0; j < cabs.length; j++) { if (cabs[j].from === d.id || cabs[j].to === d.id) cc++; }
                if (cc > 0) {
                    svg += '  <circle cx="' + (d.x + r * 0.5) + '" cy="' + (d.y + r * 0.5) +
                        '" r="7" fill="rgba(41,182,246,0.85)"/>\n';
                    svg += '  <text x="' + (d.x + r * 0.5) + '" y="' + (d.y + r * 0.5 + 0.5) +
                        '" text-anchor="middle" dominant-baseline="central" font-size="7" font-family="JetBrains Mono,monospace" font-weight="700" fill="#fff">' +
                        cc + '</text>\n';
                }
                svg += '  <text x="' + d.x + '" y="' + (d.y + r + 7) +
                    '" text-anchor="middle" font-size="9" font-weight="700" fill="' + textColor + '">' + escapeXml(
                        d.name) + '</text>\n';
                svg += '  <text x="' + d.x + '" y="' + (d.y + r + 19) +
                    '" text-anchor="middle" font-size="7" font-family="JetBrains Mono,monospace" font-weight="500" fill="' +
                    ipColor + '">' + escapeXml(d.ip) + '</text>\n';

            svg += '</svg>';

            link.href = URL.createObjectURL(blob);

        // ===== IMPORT JSON =====
        function importJSON(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (!data.devices || !data.cables) { toast('Invalid JSON format', 'er'); return; }
                    devs = [];
                    cabs = [];
                    idC = 0;
                    cidC = 0;
                    _ssidCounter = 0;
                    _pppoeCounter = 0;
                    _vlanCounter = 0;
                    for (var i = 0; i < data.devices.length; i++) {
                        var d = data.devices[i];
                        if (!DT[d.type]) { toast('Unknown type: ' + d.type, 'er'); continue; }
                        if (d.id > idC) idC = d.id;
                        d.sc = 0;
                        d.ts = 1;
                        d.ph = Math.random() * 6.28;
                        if (!d.portTypes) { d.portTypes = [];
                            for (var p = 1; p <= d.ports; p++) d.portTypes.push(null); }
                        if (d.portTypes && d.portTypes.length > 0 && typeof d.portTypes[0] === 'string') {
                            d.portTypes = d.portTypes.map(function(t) { return t ? { type: t,
                                    vlan: '' } : null; });
                        }
                        if (!d.notes) d.notes = '';
                        if (!d.operationMode) d.operationMode = '';
                        if (!d.ssidProfiles) d.ssidProfiles = [];
                        if (!d.lan) d.lan = { ip: '', subnet: '', cidr: '' };
                        if (!d.dhcp) d.dhcp = { startIP: '', endIP: '', gateway: '', domain: '',
                            primaryDNS: '', secondaryDNS: '' };
                        if (!d.pppoeProfiles) d.pppoeProfiles = [];
                        if (!d.vlanProfiles) d.vlanProfiles = [];
                        if (d.ssidProfiles) {
                            for (var j = 0; j < d.ssidProfiles.length; j++) {
                                if (d.ssidProfiles[j].id > _ssidCounter) _ssidCounter = d.ssidProfiles[j]
                                    .id;
                            }
                        }
                        if (d.pppoeProfiles) {
                            for (var j = 0; j < d.pppoeProfiles.length; j++) {
                                if (d.pppoeProfiles[j].id > _pppoeCounter) _pppoeCounter = d.pppoeProfiles[
                                    j].id;
                            }
                        }
                        if (d.vlanProfiles) {
                            for (var j = 0; j < d.vlanProfiles.length; j++) {
                                if (d.vlanProfiles[j].id > _vlanCounter) _vlanCounter = d.vlanProfiles[j]
                                    .id;
                            }
                        }
                        devs.push(d);
                    }
                    for (var i = 0; i < data.cables.length; i++) {
                        var c = data.cables[i];
                        if (c.id > cidC) cidC = c.id;
                        if (!c.pts) c.pts = [];
                        if (!c.ssid) c.ssid = '';
                        if (!c.pppoe) c.pppoe = '';
                        if (!c.vlanSource) c.vlanSource = '';
                        if (!c.vlanDest) c.vlanDest = '';
                        cabs.push(c);
                    }
                    if (data.view) { pX = data.view.panX || 0;
                        pY = data.view.panY || 0;
                        zm = data.view.zoom || 1.0; }
                    if (data.counters) {
                        if (data.counters.device > idC) idC = data.counters.device;
                        if (data.counters.cable > cidC) cidC = data.counters.cable;
                        if (data.counters.ssid > _ssidCounter) _ssidCounter = data.counters.ssid;
                        if (data.counters.pppoe > _pppoeCounter) _pppoeCounter = data.counters.pppoe;
                        if (data.counters.vlan > _vlanCounter) _vlanCounter = data.counters.vlan;
                    }
                    sDI = null;
                    sCI = null;
                    cSrc = null;
                    selectedDevs = [];
                    skipAutoScroll = false;
                    saveToIDB();
                    _undoStack = []; _redoStack = []; _updateUndoRedoBtns();
                    uUI(true);
                    ren();
                    toast('Import successful (v2 with enhanced profiles)', 'ok');
                } catch (err) {
                    toast('Failed to import JSON: ' + err.message, 'er');
                }
            };
            reader.readAsText(file);
        }

        function generatePDF() {
